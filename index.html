<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paolla — Склад та Виробництво</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--sidebar:#161b22;--card:#1c2128;--border:#30363d;--accent:#238636;--accent2:#1f6feb;--text:#e6edf3;--text2:#8b949e;--danger:#da3633;--warning:#e3b341}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
#app{display:flex;width:100%;min-height:100vh}
/* Sidebar */
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:transparent;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo h1{font-size:18px;font-weight:700;color:var(--text)}
.logo span{font-size:11px;color:var(--text2);display:block}
nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:8px 16px 4px;font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text2);letter-spacing:0.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border-radius:6px;margin:1px 8px;transition:all 0.2s;font-size:14px;color:var(--text2);border:none;background:none;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:rgba(35,134,54,0.15);color:var(--accent);font-weight:500}
.nav-item .badge{margin-left:auto;background:var(--accent);color:white;border-radius:10px;padding:1px 6px;font-size:11px}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px;cursor:pointer}
.avatar{width:32px;height:32px;background:linear-gradient(135deg,#6e40c9,#1f6feb);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:white}
/* Main */
.main{flex:1;min-width:0;margin-left:240px;display:flex;flex-direction:column;min-height:100vh}
.menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:22px;line-height:1;cursor:pointer;padding:0 4px 0 0}.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}.sidebar-overlay.open{display:block}.topbar{background:var(--sidebar);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-size:16px;font-weight:600}
.topbar-actions{display:flex;align-items:center;gap:12px}
.content{padding:24px;flex:1}
/* Cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-card .label{font-size:12px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:28px;font-weight:700;margin-bottom:4px}
.stat-card .sub{font-size:12px;color:var(--text2)}
.stat-card.green .value{color:var(--accent)}
.stat-card.blue .value{color:var(--accent2)}
.stat-card.yellow .value{color:var(--warning)}
.stat-card.red .value{color:var(--danger)}
/* Buttons */
.btn{padding:8px 16px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:14px;font-weight:500;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);border-color:var(--accent);color:white}
.btn-primary:hover{background:#2ea043;border-color:#2ea043}
.btn-secondary{background:var(--card);color:var(--text)}
.btn-secondary:hover{background:#22272e;border-color:#8b949e}
.btn-danger{background:var(--danger);border-color:var(--danger);color:white}
.btn-sm{padding:5px 10px;font-size:12px}
/* Tables */
.table-container{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
      .page-header{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.table-header h3{font-size:15px;font-weight:600}
.table-search{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-size:13px;flex:1 1 140px;width:auto;min-width:0}
.search-input:focus{outline:none;border-color:var(--accent2)}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 16px;text-align:left;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);background:var(--sidebar)}
tbody td{padding:12px 16px;font-size:14px;border-bottom:1px solid rgba(48,54,61,0.5)}
tbody tr:hover{background:rgba(255,255,255,0.02)}
tbody tr:last-child td{border-bottom:none}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:12px;font-weight:500}
.badge-green{background:rgba(35,134,54,0.15);color:#3fb950;border:1px solid rgba(63,185,80,0.3)}
.badge-blue{background:rgba(31,111,235,0.15);color:#58a6ff;border:1px solid rgba(88,166,255,0.3)}
.badge-yellow{background:rgba(227,179,65,0.15);color:#e3b341;border:1px solid rgba(227,179,65,0.3)}
.badge-red{background:rgba(218,54,51,0.15);color:#f85149;border:1px solid rgba(248,81,73,0.3)}
.badge-gray{background:rgba(139,148,158,0.15);color:#8b949e;border:1px solid rgba(139,148,158,0.3)}
  .badge-gray:empty{background:linear-gradient(135deg,rgba(10,132,255,0.95),rgba(94,92,230,0.95));border:1px solid rgba(10,132,255,0.3)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:540px;max-width:95vw;max-height:85vh;overflow:auto}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-header h3{font-size:16px;font-weight:600}
.modal-body{padding:24px;overflow-y:auto;flex:1 1 auto;min-height:0}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:14px}
.form-input:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 3px rgba(31,111,235,0.1)}
.form-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* Auth */
#auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:999}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:400px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo .icon{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px}
.auth-logo h1{font-size:24px;font-weight:700}
.auth-logo p{color:var(--text2);font-size:14px;margin-top:4px}
.auth-tabs{display:flex;background:var(--bg);border-radius:8px;padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:8px;text-align:center;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all 0.2s}
.auth-tab.active{background:var(--card);color:var(--text)}
/* Progress */
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width 0.3s}
/* Charts */
.chart-container{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.chart-title{font-size:15px;font-weight:600;margin-bottom:16px}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:120px}
.chart-bar{flex:1;background:linear-gradient(to top,var(--accent),var(--accent2));border-radius:4px 4px 0 0;min-height:4px;transition:height 0.3s}
.chart-labels{display:flex;gap:8px;margin-top:8px}
.chart-label{flex:1;text-align:center;font-size:11px;color:var(--text2)}
/* Notification */
.notification{position:fixed;top:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;z-index:2000;display:flex;align-items:center;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,0.4);animation:slideIn 0.3s ease}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.notification.success{border-color:rgba(63,185,80,0.4)}
.notification.error{border-color:rgba(248,81,73,0.4)}
/* Tabs */
.page-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:24px}
.page-tab{padding:10px 16px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s}
.page-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* Timeline */
.timeline{display:flex;flex-direction:column;gap:0}
.timeline-item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid rgba(48,54,61,0.5)}
.timeline-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0}
.timeline-dot.green{background:var(--accent)}
.timeline-dot.blue{background:var(--accent2)}
.timeline-dot.yellow{background:var(--warning)}
.timeline-dot.red{background:var(--danger)}
.timeline-info{flex:1}
.timeline-title{font-size:14px;font-weight:500;margin-bottom:2px}
.timeline-sub{font-size:12px;color:var(--text2)}
.timeline-time{font-size:12px;color:var(--text2);white-space:nowrap}
/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state .icon{font-size:48px;margin-bottom:16px}
.empty-state h3{font-size:16px;color:var(--text);margin-bottom:8px}
/* View toggle */
.view-toggle{display:inline-flex;background:linear-gradient(135deg,rgba(10,132,255,0.95),rgba(94,92,230,0.95));border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
.view-toggle button{background:none;border:none;color:var(--text2);cursor:pointer;padding:5px 9px;border-radius:6px;font-size:14px;line-height:1;display:flex;align-items:center;transition:all 0.2s}
.view-toggle button:hover{color:var(--text)}
.view-toggle button:not(.active){background:linear-gradient(135deg,rgba(10,132,255,0.95),rgba(94,92,230,0.95))!important;color:#fff!important}.view-toggle button.active{background:linear-gradient(135deg,rgba(10,132,255,0.95),rgba(94,92,230,0.95))!important;color:#fff!important;box-shadow:inset 0 1px 0 rgba(255,255,255,0.5)}
/* Card grid (rounded squares) */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(150px,100%),1fr));gap:14px}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:8px;transition:all 0.2s;position:relative}
.item-card:hover{border-color:#8b949e;transform:translateY(-2px)}
.item-card .ic-thumb{width:100%;aspect-ratio:1/1;border-radius:12px;background:linear-gradient(135deg,rgba(35,134,54,0.15),rgba(31,111,235,0.15));display:flex;align-items:center;justify-content:center;font-size:42px;margin-bottom:4px}
.item-card .ic-name{font-size:14px;font-weight:600;color:#000000;line-height:1.3}
.item-card .ic-meta{font-size:12px;color:var(--text2);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.item-card .ic-actions{display:flex;gap:6px;margin-top:auto;padding-top:4px}
.item-card .ic-actions .btn{flex:1;justify-content:center}
/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Responsive */
@media(max-width:768px){.sidebar{width:200px}.main{margin-left:200px}.stats-grid{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}}
@media(max-width:600px){.sidebar{transform:translateX(-100%);transition:transform 0.3s}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.menu-toggle{display:inline-flex;align-items:center}.topbar{padding:0 12px}/* mobile-fit */.modal{width:calc(100vw - 16px);max-width:calc(100vw - 16px)}.modal-body{padding:16px;overflow-x:hidden;overflow-y:auto;flex:1 1 auto;min-height:0}th,td{padding:8px 6px;font-size:13px}.data-table{display:block;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}.data-table thead,.data-table tbody,.data-table tr{display:table;width:100%;table-layout:fixed}.data-table .item-product,.data-table .item-qty,.data-table .item-price{min-width:0}.form-input,.form-select{font-size:13px;padding:8px 8px}.form-row{grid-template-columns:1fr}/* dash-fit */.content>div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}.table-container{overflow-x:auto;-webkit-overflow-scrolling:touch}/* empty-fit */.table-header{flex-wrap:wrap;gap:8px}.table-container table{table-layout:fixed;width:100%}.table-container th,.table-container td{padding:8px 6px;white-space:normal;word-break:break-word;overflow-wrap:anywhere}}}
  /* ===== Apple Liquid Glass - Light Theme ===== */ :root{--bg:#eef1f7;--card:rgba(255,255,255,0.55);--border:rgba(255,255,255,0.7);--text:#1c2330;--text2:#6b7488;--accent:#0a84ff;--accent2:#5e5ce6;--sidebar:rgba(255,255,255,0.6);} body{background:#eef1f7!important;color:#1c2330!important;position:relative;overflow-x:hidden;} body::before{content:"";position:fixed;inset:-20%;z-index:-2;background:radial-gradient(40% 50% at 18% 22%,rgba(120,90,255,0.35),transparent 60%),radial-gradient(45% 55% at 82% 18%,rgba(10,132,255,0.32),transparent 60%),radial-gradient(50% 55% at 75% 85%,rgba(255,120,180,0.30),transparent 62%),radial-gradient(45% 50% at 12% 88%,rgba(0,210,180,0.28),transparent 60%);filter:saturate(1.1);animation:glassFloat 22s ease-in-out infinite alternate;} body::after{content:"";position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(255,255,255,0.55),rgba(255,255,255,0.30));} @keyframes glassFloat{0%{transform:translate3d(0,0,0) scale(1);}50%{transform:translate3d(2%,-1.5%,0) scale(1.05);}100%{transform:translate3d(-2%,1.5%,0) scale(1.04);}} .sidebar,.stat-card,.table-container,.modal,.auth-card,.chart-container,.item-card,.notification,.topbar{background:linear-gradient(160deg,rgba(255,255,255,0.75),rgba(255,255,255,0.45))!important;-webkit-backdrop-filter:blur(28px) saturate(180%);backdrop-filter:blur(28px) saturate(180%);border:1px solid rgba(255,255,255,0.8)!important;box-shadow:0 8px 32px rgba(80,90,130,0.18),inset 0 1px 0 rgba(255,255,255,0.9)!important;color:#1c2330!important;} .sidebar{border-radius:0 26px 26px 0!important;border-left:none!important;} .topbar{border-radius:20px!important;margin:8px 10px 0!important;} .stat-card,.table-container,.item-card,.chart-container,.auth-card,.modal{border-radius:22px!important;position:relative;overflow:hidden;display:flex;flex-direction:column;} .stat-card::before,.table-container::before,.modal::before{content:"";position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.6),transparent);pointer-events:none;} .stat-card{transition:transform .35s cubic-bezier(.2,.8,.2,1),box-shadow .35s;} .stat-card:hover{transform:translateY(-4px);box-shadow:0 16px 44px rgba(80,90,130,0.28),inset 0 1px 0 rgba(255,255,255,1)!important;} .nav-item{border-radius:14px!important;transition:all .25s ease;color:#3a4356!important;} .nav-item:hover{background:rgba(255,255,255,0.6)!important;} .nav-item.active{background:linear-gradient(135deg,rgba(10,132,255,0.9),rgba(120,90,255,0.85))!important;border:1px solid rgba(255,255,255,0.6)!important;box-shadow:0 6px 18px rgba(10,132,255,0.35),inset 0 1px 0 rgba(255,255,255,0.6)!important;color:#fff!important;} .btn{border-radius:14px!important;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);transition:all .25s ease;border:1px solid rgba(255,255,255,0.7)!important;} .btn-primary{background:linear-gradient(135deg,rgba(10,132,255,0.95),rgba(94,92,230,0.95))!important;color:#fff!important;box-shadow:0 6px 18px rgba(10,132,255,0.35),inset 0 1px 0 rgba(255,255,255,0.6)!important;} .btn-primary:hover{transform:translateY(-2px);filter:brightness(1.05);} .btn-secondary{background:rgba(255,255,255,0.6)!important;color:#1c2330!important;box-shadow:inset 0 1px 0 rgba(255,255,255,0.9)!important;} .btn-secondary:hover{background:rgba(255,255,255,0.85)!important;} .search-input,.form-input,.form-select{background:rgba(255,255,255,0.6)!important;border:1px solid rgba(255,255,255,0.85)!important;border-radius:14px!important;color:#1c2330!important;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);} .search-input:focus,.form-input:focus,.form-select:focus{border-color:rgba(10,132,255,0.7)!important;box-shadow:0 0 0 3px rgba(10,132,255,0.2)!important;} thead th{background:rgba(255,255,255,0.45)!important;color:#4a5366!important;backdrop-filter:blur(8px);} tbody td{color:#1c2330!important;} tbody tr:hover{background:rgba(255,255,255,0.5)!important;} .badge{-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.6)!important;border-radius:999px!important;} .avatar,.logo-icon{box-shadow:0 6px 16px rgba(80,90,130,0.25),inset 0 1px 0 rgba(255,255,255,0.7)!important;border-radius:14px!important;} .modal-overlay{background:rgba(180,190,210,0.35)!important;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);} .logo h1,.page-title,.table-header h3,.stat-card .value{color:#1c2330!important;} .logo span,.nav-section,.stat-card .label,.stat-card .sub{color:#6b7488!important;} ::-webkit-scrollbar-thumb{background:rgba(120,130,160,0.35);border-radius:10px;} ::-webkit-scrollbar{width:10px;height:10px;} ::-webkit-scrollbar-track{background:transparent;} /* Apple-style inset table separators */ .table-container td,.table-container th,tbody td,td,thead th{border-bottom:none!important} tbody tr{background-image:linear-gradient(to right,transparent 16px,rgba(60,60,67,0.13) 16px,rgba(60,60,67,0.13) calc(100% - 16px),transparent calc(100% - 16px))!important;background-repeat:no-repeat!important;background-position:bottom left!important;background-size:100% 1px!important} tbody tr:last-child{background-image:none!important} thead tr{background-image:linear-gradient(to right,transparent 16px,rgba(60,60,67,0.16) 16px,rgba(60,60,67,0.16) calc(100% - 16px),transparent calc(100% - 16px))!important;background-repeat:no-repeat!important;background-position:bottom left!important;background-size:100% 1px!important} .table-header{border-bottom:none!important;background-image:linear-gradient(to right,transparent 16px,rgba(60,60,67,0.16) 16px,rgba(60,60,67,0.16) calc(100% - 16px),transparent calc(100% - 16px))!important;background-repeat:no-repeat!important;background-position:bottom left!important;background-size:100% 1px!important}

/* ===== Кольорова гама (голубий + червоний) ===== */
.btn,.btn-primary,.btn-secondary{background:linear-gradient(135deg,rgba(10,132,255,0.95),rgba(52,179,255,0.95))!important;color:#fff!important;border:1px solid rgba(255,255,255,0.6)!important;box-shadow:0 6px 18px rgba(10,132,255,0.30),inset 0 1px 0 rgba(255,255,255,0.5)!important;}
.btn:hover,.btn-primary:hover,.btn-secondary:hover{transform:translateY(-2px);filter:brightness(1.05);}
.btn-danger,.btn.btn-danger{background:linear-gradient(135deg,#ff453a,#ff6b6b)!important;color:#fff!important;box-shadow:0 6px 18px rgba(255,69,58,0.30),inset 0 1px 0 rgba(255,255,255,0.5)!important;}
.stat-card.green{background:linear-gradient(160deg,rgba(52,179,255,0.30),rgba(255,255,255,0.45))!important;}
.stat-card.green .value{color:#0a6cff!important;}
.stat-card.blue{background:linear-gradient(160deg,rgba(10,132,255,0.30),rgba(255,255,255,0.45))!important;}
.stat-card.blue .value{color:#0a84ff!important;}

.stat-card.yellow .value{color:#0e8fa3!important;}

function switchAuthTab(tab) {

async function loginUser() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showNotif('Заповніть всі поля', 'error');
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return showNotif(error.message, 'error');
  await initApp(data.user);
}

async function registerUser() {
  const name = document.getElementById('reg-name').value;
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) return showNotif('Заповніть всі поля', 'error');
  const { data, error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
  if (error) return showNotif(error.message, 'error');
  showNotif('Перевірте email для підтвердження', 'success');
}

async function logoutUser() {
  await sb.auth.signOut();

async function initApp(user) {
  state.user = user;

  await loadData();

}

async function loadWarehouse() {
    const savedId = localStorage.getItem('paolla_warehouse_id');
    if (savedId) {
      try {
        await sb.from('warehouse_members').upsert(
          { warehouse_id: savedId, user_id: state.user.id, access_mode: 'editor' },
          { onConflict: 'warehouse_id,user_id', ignoreDuplicates: true }
        );
      } catch(e) { console.log('join upsert error:', e); }
      const { data: wh } = await sb.from('warehouses').select('*').eq('id', savedId).single();
      state.warehouse = wh || { id: savedId, name: '' };
      const roleEl = document.getElementById('user-role');
      if (roleEl) { try { const { data: meRow } = await sb.from('warehouse_members').select('access_mode').eq('warehouse_id', savedId).eq('user_id', state.user.id).single(); roleEl.textContent = (meRow && meRow.access_mode) || 'editor'; } catch(e) { roleEl.textContent = 'editor'; } }
      await loadSnapshotForCurrent();
      const nameEl = document.getElementById('warehouse-name');
      if (nameEl) nameEl.textContent = (wh && wh.name) || ('Склад ' + savedId.substring(0,8));
      return;
    }
    const { data: member } = await sb.from('warehouse_members').select('*').eq('user_id', state.user.id).single();
    if (member) {
      const { data: wh } = await sb.from('warehouses').select('*').eq('id', member.warehouse_id).single();
      state.warehouse = wh;
      const roleEl = document.getElementById('user-role');
      if (roleEl) roleEl.textContent = member.access_mode || 'owner';
      await loadSnapshotForCurrent();
      const nameEl = document.getElementById('warehouse-name');
      if (nameEl) nameEl.textContent = (wh && wh.name) || ('Склад ' + member.warehouse_id.substring(0,8));
    } else {
      const { data: newWh } = await sb.from('warehouses').insert({ owner_user_id: state.user.id }).select().single();
      if (newWh) {
        await sb.from('warehouse_members').insert({ warehouse_id: newWh.id, user_id: state.user.id, access_mode: 'owner' });
        state.warehouse = newWh;
        const roleEl = document.getElementById('user-role');
        if (roleEl) roleEl.textContent = 'owner';
        const nameEl = document.getElementById('warehouse-name');
        if (nameEl) nameEl.textContent = newWh.name || ('Склад ' + String(newWh.id).substring(0,8));
        await initDefaultData();
      }
    }
}

async function loadSnapshotForCurrent() {
    if (!state.warehouse) return;
    const { data: snap } = await sb.from('warehouse_snapshots').select('*').eq('warehouse_id', state.warehouse.id).single();
    state.products = []; state.operations = []; state.orders = []; state.recipes = []; state.production = []; state.clients = [];
    state.workshops = [];
    if (snap && snap.payload) {
      try {
        const decoded = JSON.parse(decodeURIComponent(escape(atob(snap.payload.split('.')[1]))));
        if (decoded.products) state.products = Array.from(new Map(decoded.products.map(x => [x.id, x])).values());
        if (decoded.operations) state.operations = decoded.operations;
        if (decoded.orders) state.orders = Array.from(new Map(decoded.orders.map(function(x){ return [x.id, x]; })).values());
        if (decoded.recipes) state.recipes = decoded.recipes;
        if (decoded.production) state.production = decoded.production;
        if (decoded.clients) state.clients = decoded.clients;
        if (decoded.workshops) state.workshops = decoded.workshops;
      } catch(e) { console.log('Snapshot parse error:', e); }
    }
}

async function loadData() {}

async function saveSnapshot() {
  if (!state.warehouse) return;
  state.orders = Array.from(new Map(state.orders.map(function(x){ return [x.id, x]; })).values());
  const data = { products: state.products, operations: state.operations, orders: state.orders, recipes: state.recipes, production: state.production, clients: state.clients, workshops: state.workshops };
  const payload = btoa(JSON.stringify({ alg: 'none' })) + '.' + btoa(unescape(encodeURIComponent(JSON.stringify(data)))) + '.';
  await sb.from('warehouse_snapshots').upsert({ warehouse_id: state.warehouse.id, payload, modified_at: new Date().toISOString(), created_at: new Date().toISOString() });
}

async function saveClient(id) {
  const c = {
    name: document.getElementById('c-name').value,
    phone: document.getElementById('c-phone').value,
    email: document.getElementById('c-email').value,
    address: document.getElementById('c-address').value,

  };

});

: '<div class="ic-actions"><button class="btn btn-secondary btn-sm" onclick="editProduct(\'' + p.id + '\')">✏️</button><button class="btn btn-secondary btn-sm" onclick="archiveProduct(\'' + p.id + '\')" title="Відправити в архів">📥</button><button class="btn btn-secondary btn-sm" onclick="deleteProduct(\'' + p.id + '\')">🗑️</button></div>';

function editProduct(id) { openProductModal(id); }

async function uploadProductPhoto(inp) {
  const file = inp.files && inp.files[0];
  if (!file) return;
  const prev = document.getElementById("p-photo-preview");
  if (prev) prev.textContent = "Завантаження...";
  try {
    const whId = (state.warehouse && state.warehouse.id) || "default";
    const pid = (window.__editingProductId) || ("p_" + Date.now() + "_" + Math.random().toString(36).slice(2,7));
    window.__editingProductId = pid;
    const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
    const path = whId + "/" + pid + "/" + Date.now() + "." + ext;
    const up = await sb.storage.from("product-photos").upload(path, file, { upsert: true, contentType: file.type || "image/jpeg" });
    if (up.error) throw up.error;
    const url = sb.storage.from("product-photos").getPublicUrl(path).data.publicUrl;
    const imgEl = document.getElementById("p-image");
    const imgsEl = document.getElementById("p-images");
    let arr = [];
    try { arr = JSON.parse(imgsEl.value || "[]"); } catch(e) { arr = []; }
    if (!Array.isArray(arr)) arr = [];
    arr.push(url);
    imgEl.value = url;
    imgsEl.value = JSON.stringify(arr);
    renderProductPhotoPreview();
    showNotif("Фото завантажено", "success");
  } catch (e) {
    if (prev) prev.textContent = "";
    showNotif("Помилка завантаження: " + (e.message || e), "error");
  } finally {
    inp.value = "";
  }
}
function renderProductPhotoPreview() {
  const prev = document.getElementById("p-photo-preview");
  const imgsEl = document.getElementById("p-images");
  if (!prev || !imgsEl) return;
  let arr = [];
  try { arr = JSON.parse(imgsEl.value || "[]"); } catch(e) { arr = []; }
  if (!Array.isArray(arr)) arr = [];
  prev.innerHTML = arr.map(function(u, i){
    return "<span style=\"position:relative;display:inline-block;margin:4px\">" +
      "<img src=\"" + u + "\" style=\"width:64px;height:64px;object-fit:cover;border-radius:8px\">" +
      "<button type=\"button\" onclick=\"removeProductPhoto(" + i + ")\" style=\"position:absolute;top:-6px;right:-6px;background:#e00;color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;line-height:1\">×</button>" +
      "</span>";
  }).join("");
}
function removeProductPhoto(i) {
  const imgEl = document.getElementById("p-image");
  const imgsEl = document.getElementById("p-images");
  let arr = [];
  try { arr = JSON.parse(imgsEl.value || "[]"); } catch(e) { arr = []; }
  if (!Array.isArray(arr)) arr = [];
  arr.splice(i, 1);
  imgsEl.value = JSON.stringify(arr);
  imgEl.value = arr[0] || "";
  renderProductPhotoPreview();
}
async function saveProduct(id) {
  const p = {
    name: document.getElementById('p-name').value,
    category: document.getElementById('p-category').value || 'Інше',
    unit: document.getElementById('p-unit').value,
    quantity: parseFloat(document.getElementById('p-qty').value) || 0,
    min_qty: parseFloat(document.getElementById('p-min').value) || 0,
    price: parseFloat(document.getElementById('p-price').value) || 0,
    image: (function(){ var e=document.getElementById('p-image'); return e? e.value : ''; })(),
    images: (function(){ var e=document.getElementById('p-images'); if(!e) return []; try{ var a=JSON.parse(e.value||'[]'); return Array.isArray(a)?a:[]; }catch(_){ return []; } })()
  };
  if (!p.name) return showNotif('Введіть назву товару', 'error');
  if (id) {
    const idx = state.products.findIndex(x => x.id === id);
    state.products[idx] = { ...state.products[idx], ...p };
  } else {
    p.id = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
    state.products.push(p);
  }
  await saveSnapshot();
  closeModal();
  renderProducts();
  showNotif('Товар збережено', 'success');
}

async function deleteProduct(id) {
  if (!confirm('Видалити цей товар?')) return;
  state.products = state.products.filter(p => p.id !== id);
  await saveSnapshot();
  renderProducts();
  showNotif('Товар видалено', 'success');
}


async function archiveProduct(id) {
const p = state.products.find(x => String(x.id) === String(id));
if (!p) return;
if (!confirm('Відправити товар "' + p.name + '" в архів?')) return;
p.archived = true;
await saveSnapshot();
renderProducts();
showNotif('Товар відправлено в архів', 'success');
}

async function unarchiveProduct(id) {
const p = state.products.find(x => String(x.id) === String(id));
if (!p) return;
p.archived = false;
await saveSnapshot();
renderProducts();
showNotif('Товар повернуто з архіву', 'success');
}

function renderIncoming() { renderOperation('incoming'); }
function renderOutgoing() { renderOperation('outgoing'); }

function renderOperation(type) {
  var isIncoming = (type === 'incoming');
  var icon = isIncoming ? '⬇️' : '⬆️';
  var title = isIncoming ? 'Прихід товарів' : 'Видаток товарів';
  var btnLabel = isIncoming ? '+ Новий прихід' : '+ Новий видаток';
  var ops = state.operations.filter(function(o) { return o.type === type; });
  var html = '<div class="table-container">';
  html += '<div class="table-header"><h3>' + icon + ' ' + title + '</h3><div class="table-search"><button class="btn btn-primary" id="add-op-btn">' + btnLabel + '</button></div></div>';
  html += '<table class="data-table"><thead><tr><th>Дата</th><th>Контрагент</th><th>Сума</th><th>Дії</th></tr></thead><tbody>';
  if (ops.length === 0) {
    html += '<tr><td colspan="4"><div class="empty-state"><div class="icon">' + icon + '</div><h3>Немає операцій</h3><p>Додайте першу операцію</p></div></td></tr>';
  } else {
    ops.slice().reverse().forEach(function(o) {
      var items = o.items;
      if (!items && o.product_name) {
        items = [{product_id: o.product_id, product_name: o.product_name, quantity: o.quantity, price: o.price}];
      }
      items = items || [];
      var totalAmt = 0;
      var itemsSummary = items.map(function(it) {
        totalAmt += (Number(it.quantity) || 0) * (Number(it.price) || 0);
        return it.product_name + ' ×' + it.quantity;
      }).join('; ');
      var totalStr = totalAmt > 0 ? totalAmt.toFixed(2) : '—';
      var counterparty = o.counterparty || '—';
      html += '<tr>';
      html += '<td>' + (o.date || '—') + '</td>';
      html += '<td>' + counterparty + '</td>';
      html += '<td>' + totalStr + '</td>';
      html += '<td><button class="btn btn-sm" title="Редагувати" onclick="editOperation(' + o.id + ',&apos;' + type + '&apos;)">✏️</button> <button class="btn btn-sm" title="Друк" onclick="printOperation(' + o.id + ',&apos;' + type + '&apos;)">🖨️</button> <button class="btn btn-sm btn-danger" onclick="deleteOperation(' + o.id + ',&apos;' + type + '&apos;)">✕</button></td>';
      html += '</tr>';
    });
  }
  html += '</tbody></table></div>';
  document.getElementById('page-content').innerHTML = html;

async function saveOperation(type, editId) {
  var counterpartyEl = document.getElementById('op-counterparty');
  var counterparty = counterpartyEl ? counterpartyEl.value.trim() : '';
  var dateEl = document.getElementById('op-date');
  var date = dateEl ? dateEl.value : '';
  var notesEl = document.getElementById('op-notes');
  var notes = notesEl ? notesEl.value.trim() : '';

  if (!counterparty) { showNotif('Введіть назву контрагента', 'error'); return; }

  var tbody = document.getElementById('op-items-body');
  var rows = tbody ? tbody.querySelectorAll('tr') : [];
  var items = [];
  var hasError = false;
  rows.forEach(function(tr) {
    if (hasError) return;
    var sel = tr.querySelector('.item-product');
    var qtyInp = tr.querySelector('.item-qty');
    var priceInp = tr.querySelector('.item-price');
    if (!sel || !qtyInp) return;
    var productId = sel.value;
    if (!productId) { hasError = true; showNotif('Оберіть товар у кожному рядку', 'error'); return; }
    var qty = parseFloat(qtyInp.value);
    if (!qty || qty <= 0) { hasError = true; showNotif('Введіть кількість більше 0', 'error'); return; }
    var price = parseFloat(priceInp ? priceInp.value : '') || 0;
    var opt = sel.options[sel.selectedIndex];
    var productName = opt ? (opt.dataset && opt.dataset.name ? opt.dataset.name : opt.text.split('(')[0].trim()) : String(productId);
    items.push({product_id: productId, product_name: productName, quantity: qty, price: price});
  });
  if (hasError) return;
  if (items.length === 0) { showNotif('Додайте хоча б один товар', 'error'); return; }

  items.forEach(function(it) {
    var prod = state.products.find(function(p) { return String(p.id) === String(it.product_id); });
    if (prod) {
      if (type === 'incoming') {
        prod.quantity = (Number(prod.quantity) || 0) + it.quantity;
      } else {
        prod.quantity = Math.max(0, (Number(prod.quantity) || 0) - it.quantity);
      }
    }
  });

  if (editId != null) {
    var existing = state.operations.find(function(o) { return o.id === editId; });
    if (existing) {
      var oldItems = existing.items || [];
      oldItems.forEach(function(it) {
        var prod = state.products.find(function(p) { return String(p.id) === String(it.product_id); });
        if (prod) {
          if (existing.type === 'incoming') { prod.quantity = Math.max(0, (Number(prod.quantity) || 0) - Number(it.quantity)); }
          else { prod.quantity = (Number(prod.quantity) || 0) + Number(it.quantity); }
        }
      });
      existing.counterparty = counterparty;
      existing.date = date;
      existing.notes = notes;
      existing.items = items;
    }
    await saveSnapshot();
    closeModal();
    renderOperation(type);
    showNotif('Операцію оновлено', 'success');
    return;
  }
  var op = { id: Date.now(), type: type, counterparty: counterparty, date: date, notes: notes, items: items };
  state.operations.push(op);
  await saveSnapshot();
  closeModal();
  renderOperation(type);
  showNotif('Операцію збережено', 'success');
}

      return '<option value="'+w+'" '+(op.workshop===w?'selected':'')+'>'+w+'</option>';

      '<option value="">— Оберіть цех —</option>'+opts+'</select>' +
      '<button type="button" class="btn btn-danger btn-sm" onclick="removeOrderOp('+idx+')">−</button>' +

function addOrderOp() {

function removeOrderOp(idx) {

async function saveOrder() {

  await saveSnapshot();
  renderOrders();

function openOrderView(id) {
  var o = state.orders.find(function(x){ return x.id === id; });
  if (!o) return;
  window._viewOrderId = id;
  document.getElementById('modal-title').textContent = o.number;
  var ops = o.operations || [];
  var firstPending = -1;
  for (var i = 0; i < ops.length; i++) { if (!ops[i].done) { firstPending = i; break; } }
  var html = '<div class="form-group"><label class="form-label">Товар</label><input class="form-input" value="'+(o.product||'')+'" readonly></div>';
  html += '<div class="form-group"><label class="form-label">Операції</label><div class="op-list">';
  if (!ops.length) {
    html += '<div style="color:var(--text2);font-size:13px;padding:8px 0">У цьому наряді немає операцій.</div>';
  } else {
    ops.forEach(function(op, idx){
      var isActive = idx === firstPending;
      var icon = op.done ? '<span style="color:var(--accent)">✅</span>' : (isActive ? '<span style="color:var(--accent2)">▶</span>' : '<span style="color:var(--text2)">○</span>');
      var stateLabel = op.done ? 'Готово' : (isActive ? 'В роботі' : 'Очікує');
      html += '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">';
      html += '<div style="font-size:16px;line-height:1.4">'+icon+'</div>';
      html += '<div style="flex:1">';
      html += '<div style="font-weight:600">'+op.workshop+'</div>';
      html += '<div style="color:var(--text2);font-size:12px;margin-top:2px">'+stateLabel+'</div>';
      if (isActive) {
        html += '<button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="toggleOrderOp('+id+','+idx+',true)">Позначити готовим</button>';
      } else if (op.done) {
        html += '<button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="toggleOrderOp('+id+','+idx+',false)">Скасувати</button>';
      }
      html += '</div></div>';
    });
  }
  // Віртуальний фінальний крок: Прийняття на склад (не входить у operations, додається завжди останнім)
  var allOpsDone = ops.length === 0 || ops.every(function(op){ return op.done; });
  var recvIcon = o.received ? '<span style="color:var(--accent)">✅</span>' : (allOpsDone ? '<span style="color:var(--accent2)">▶</span>' : '<span style="color:var(--text2)">○</span>');
  var recvState = o.received ? 'Готово' : (allOpsDone ? 'В роботі' : 'Очікує');
  html += '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0">';
  html += '<div style="font-size:16px;line-height:1.4">'+recvIcon+'</div>';
  html += '<div style="flex:1">';
  html += '<div style="font-weight:600">Прийняття на склад</div>';
  html += '<div style="color:var(--text2);font-size:12px;margin-top:2px">'+(o.product||'')+' · '+(o.quantity||1)+' шт.</div>';
  html += '<div style="color:var(--text2);font-size:12px;margin-top:2px">'+recvState+'</div>';
  if (o.received) {
    html += '<button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="receiveOrderStock('+id+',false)">Скасувати</button>';
  } else if (allOpsDone) {
    html += '<button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="receiveOrderStock('+id+',true)">Позначити готовим</button>';
  }
  html += '</div></div>';
  html += '</div></div>';
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-footer').innerHTML = '<button class="btn btn-secondary" onclick="closeModal()">Закрити</button>';
  document.getElementById('modal-overlay').style.display = 'flex';
}

async function toggleOrderOp(orderId, idx, done) {
  var o = state.orders.find(function(x){ return x.id === orderId; });
  if (!o || !o.operations || !o.operations[idx]) return;
  if (done) {
    o.operations[idx].done = true;
  } else {
    for (var i = idx; i < o.operations.length; i++) { o.operations[i].done = false; }
  }
  var allDone = o.operations.length === 0 || o.operations.every(function(op){ return op.done; });
  var anyDone = o.operations.some(function(op){ return op.done; });
  o.status = o.received ? 'ready' : (allDone || anyDone ? 'in_production' : 'new');
  await saveSnapshot();
  openOrderView(orderId);
  renderOrders();
}

async function receiveOrderStock(orderId, done) {
  var o = state.orders.find(function(x){ return x.id === orderId; });
  if (!o) return;
  var opsDone = !o.operations || o.operations.length === 0 || o.operations.every(function(op){ return op.done; });
  if (done && !opsDone) { showNotif('Спершу завершіть усі цехи', 'error'); return; }
  var qty = parseInt(o.quantity) || 1;
  if (done && !o.received) {
    var p = state.products.find(function(pr){ return pr.name === o.product; });
    if (p) { p.quantity = (parseInt(p.quantity)||0) + qty; }
    o.received = true;
    o.status = 'ready';
  } else if (!done && o.received) {
    var p2 = state.products.find(function(pr){ return pr.name === o.product; });
    if (p2) { p2.quantity = Math.max(0, (parseInt(p2.quantity)||0) - qty); }
    o.received = false;
    o.status = opsDone ? 'in_production' : 'new';
  }
  await saveSnapshot();
  openOrderView(orderId);
  renderOrders();
  renderProducts && renderProducts();
}

async function saveRecipe() {
  var name = document.getElementById('r-name') ? document.getElementById('r-name').value.trim() : '';
  if (!name) return showNotif('Введіть назву', 'error');
  var departments = (window._recipeDepts||[]).map(function(d){return {id:d.id, name:d.name};});
  var ings = [];
  var ingList = document.getElementById('ingredients-list');
  if (ingList) {
    Array.from(ingList.children).forEach(function(row){
      var sel = row.querySelector('.item-product');
      var qtyInp = row.querySelector('.item-qty');
      if (sel && qtyInp && sel.value && parseFloat(qtyInp.value) > 0) {
        var p = state.products.find(function(x){return String(x.id)===String(sel.value);});
        ings.push({ product_id: parseInt(sel.value), name: p?p.name:sel.value, qty: parseFloat(qtyInp.value), unit: p?(p.unit||''):'' });
      }
    });
  }
  state.recipes.push({ id: Date.now(), name: name, output: parseFloat(document.getElementById('r-output').value)||1, unit: document.getElementById('r-unit').value, time: parseInt(document.getElementById('r-time').value)||60, departments: departments, ingredients: ings });

function setProductionView(mode) {
  state.productionView = mode;
  try { localStorage.setItem('paolla_productionView', mode); } catch(e) {}
  renderProduction();
}

function renderProduction() {
  var orders = state.orders || [];
  var cats = [...new Set(orders.map(function(o){return o.category;}).filter(Boolean))];
  var models = [...new Set(orders.map(function(o){return o.product;}).filter(Boolean))];
  var filterCat = window._prodFilterCat || '';
  var filterModel = window._prodFilterModel || '';
  var matchFn = function(o){ return (!filterCat||o.category===filterCat) && (!filterModel||o.product===filterModel); };
  var active = orders.filter(function(o){ return !o.received && matchFn(o); });
  var done = orders.filter(function(o){ return o.received && matchFn(o); });
  var catOpts = cats.map(function(c){return '<option value="'+c+'" '+(filterCat===c?'selected':'')+'>'+c+'</option>';}).join('');
  var modelOpts = models.map(function(m){return '<option value="'+m+'" '+(filterModel===m?'selected':'')+'>'+m+'</option>';}).join('');
  var html = '<div class="page-header"><h2>⚙️ Виробництво</h2></div>';
  html += '<div class="form-row" style="margin-bottom:12px;gap:8px">';
  html += '<select class="form-select" style="flex:1" onchange="window._prodFilterCat=this.value;renderProduction()"><option value="">— Всі категорії —</option>'+catOpts+'</select>';
  html += '<select class="form-select" style="flex:1" onchange="window._prodFilterModel=this.value;renderProduction()"><option value="">— Всі моделі —</option>'+modelOpts+'</select>';
  html += '</div>';
  html += '<h3 style="margin:0 0 10px;color:var(--text)">🔵 У виробництві ('+active.length+')</h3>';
  if (active.length === 0) {
    html += '<div style="color:var(--text2);margin-bottom:24px">Немає активних нарядів</div>';
  } else {
    html += '<div style="display:grid;gap:10px;margin-bottom:24px">';
    active.forEach(function(o){
      var ops = o.operations || [];
      var total = ops.length;
      var doneCnt = ops.filter(function(op){return op.done;}).length;
      var allOpsDone = total > 0 && doneCnt === total;
      var firstPending = -1;
      for (var i=0;i<ops.length;i++){ if(!ops[i].done){ firstPending=i; break; } }
      var opsHtml = ops.map(function(op, idx){
        var st = op.done ? 'done' : (idx===firstPending ? 'active' : 'wait');
        var cls = st==='done'?'badge-green':st==='active'?'badge-blue':'badge-gray';
        var icon = st==='done'?'✅':st==='active'?'⏳':'⏸️';
        return '<span class="badge '+cls+'" style="margin:2px">'+icon+' '+op.workshop+'</span>';
      }).join('');
      var recvCls = allOpsDone ? 'badge-blue' : 'badge-gray';
      var recvIcon = allOpsDone ? '⏳' : '⏸️';
      opsHtml += '<span class="badge '+recvCls+'" style="margin:2px">'+recvIcon+' Прийняття на склад</span>';
      var pct = total > 0 ? Math.round(doneCnt/total*100) : 0;
      html += '<div class="card" style="padding:14px;cursor:pointer" onclick="openOrderView('+o.id+')">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
      html += '<div style="font-weight:700;font-size:15px">'+o.number+' · '+(o.product||'')+'</div>';
      html += '<div style="color:var(--text2);font-size:13px">'+(o.quantity||1)+' шт · '+doneCnt+'/'+total+' цехів</div>';
      html += '</div>';
      html += '<div style="height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:'+pct+'%;background:var(--accent2)"></div></div>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:2px">'+opsHtml+'</div>';
      html += '</div>';
    });
    html += '</div>';
  }
  html += '<h3 style="margin:0 0 10px;color:var(--text)">✅ Завершено ('+done.length+')</h3>';
  if (done.length === 0) {
    html += '<div style="color:var(--text2)">Немає завершених</div>';
  } else {
    html += '<table class="data-table"><thead><tr><th>Наряд</th><th>Товар</th><th>К-сть</th><th>Прийнято</th></tr></thead><tbody>';
    done.forEach(function(o){ html += '<tr style="cursor:pointer" onclick="openOrderView('+o.id+')"><td>'+o.number+'</td><td>'+(o.product||'')+'</td><td>'+(o.quantity||1)+' шт</td><td>'+(o.date||'')+'</td></tr>'; });
    html += '</tbody></table>';
  }
  document.getElementById('page-content').innerHTML = html;
}

async function advanceDeptStatus(prodId, deptId) {
  var prod = state.production.find(function(p){return p.id===prodId;});
  if (!prod || !prod.departments) return;
  var dept = prod.departments.find(function(d){return d.id===deptId;});
  if (!dept) return;
  dept.status = dept.status==='pending' ? 'in_progress' : dept.status==='in_progress' ? 'done' : 'pending';
  var allDone = prod.departments.every(function(d){return d.status==='done';});
  if (allDone) showNotif('Всі відділи готові! Натисніть "На склад" для завершення', 'success');
  await saveSnapshot();
  renderProduction();
}

function startProduction(recipeId) { openStartProductionModal(recipeId); }

async function confirmStartProduction(recipeId) {
  var r = state.recipes.find(function(x){return x.id===recipeId;});
  if (!r) return;
  var qty = parseInt(document.getElementById('prod-qty').value)||1;
  (r.ingredients||[]).forEach(function(ing){
    var p = state.products.find(function(x){return x.id===ing.product_id;});
    if (p) p.quantity = Math.max(0,(Number(p.quantity)||0)-ing.qty*qty);
  });
  var departments = (r.departments||[]).map(function(d){return {id:d.id,name:d.name,status:'pending'};});
  state.production.push({ id:Date.now(), recipe_name:r.name, recipe_id:r.id, quantity:qty*r.output, unit:r.unit, status:'in_progress', started:new Date().toISOString().split('T')[0], departments:departments });
  await saveSnapshot();
  closeModal();
  navigate('production');
  showNotif('Виробництво запущено!', 'success');
}

async function completeProduction(id) {
  var prod = state.production.find(function(p){return p.id===id;});
  if (!prod) return;
  prod.status = 'completed';
  var recipe = state.recipes.find(function(r){return r.id===prod.recipe_id;});
  if (recipe) {
    var pName = recipe.name;
    var existing = state.products.find(function(p){return p.name===pName;});
    if (existing) { existing.quantity = (Number(existing.quantity)||0) + Number(prod.quantity); }
    else { state.products.push({ id:Date.now(), name:pName, category:'Готова продукція', unit:recipe.unit||'шт', quantity:Number(prod.quantity), min_qty:0, price:0 }); }
  }
  await saveSnapshot();
  renderProduction();
  showNotif('Наряд завершено! Товар додано на склад.', 'success');
}

function copyWarehouseId() {
    if (!state.warehouse) return;
    const id = String(state.warehouse.id);
    if (navigator.clipboard) {
      navigator.clipboard.writeText(id).then(function(){ showNotif('ID складу скопійовано'); }).catch(function(){ showNotif('Не вдалося скопіювати', 'error'); });
    } else {
      const ta = document.createElement('textarea'); ta.value = id; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); showNotif('ID складу скопійовано'); }catch(e){ showNotif('Не вдалося скопіювати', 'error'); } ta.remove();
    }

async function joinWarehouse() {
    const input = document.getElementById('join-wh-id');
    const enteredId = (input && input.value || '').trim();
    const uuidRe = /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$/;
    if (!uuidRe.test(enteredId)) { showNotif('Невірний ID складу (потрібен UUID)', 'error'); return; }
    try {
      const { error } = await sb.from('warehouse_members').upsert(
        { warehouse_id: enteredId, user_id: state.user.id, access_mode: 'editor' },
        { onConflict: 'warehouse_id,user_id' }
      );
      if (error) { showNotif('Помилка під\'єднання: ' + error.message, 'error'); return; }
      localStorage.setItem('paolla_warehouse_id', enteredId);
      const { data: wh } = await sb.from('warehouses').select('*').eq('id', enteredId).single();
      state.warehouse = wh || { id: enteredId, name: '' };
      await loadSnapshotForCurrent();
      navigate('warehouse');
      showNotif('Під\'єднано до складу');
    } catch(e) { showNotif('Помилка під\'єднання', 'error'); console.log('joinWarehouse error:', e); }
}

async function leaveWarehouse() {
    localStorage.removeItem('paolla_warehouse_id');
    await loadWarehouse();
    navigate('warehouse');
    showNotif('Від\'єднано від спільного складу');
}

async function createAccess() {

  const role = (document.getElementById('invite-role')||{}).value||'viewer';

  const btn = document.querySelector('#modal-footer .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '...'; }

    const displayName = email.split('@')[0];
    const { error: memberErr } = await sb.from('warehouse_members').upsert({
      warehouse_id: state.warehouse.id,
      user_id: userId,
      access_mode: role,
      display_name: displayName
    }, { onConflict: 'warehouse_id,user_id' });
    if (memberErr) throw memberErr;

      </div>
      <p style="color:var(--text2);font-size:11px;margin-top:8px">Сайт: https://alchune.github.io/Paolla</p>

      saveOrder = function(){
        var editId = window._editingOrderId;
        if(editId==null){ return _origSaveOrder.apply(this, arguments); }
        var beforeIds = (state.orders||[]).map(function(o){return o.id;});
        var origOrder = (state.orders||[]).find(function(o){return o.id===editId||String(o.id)===String(editId);});
        var origStatus = origOrder ? origOrder.status : 'new';
        var r = _origSaveOrder.apply(this, arguments);
        setTimeout(function(){
          var added = (state.orders||[]).find(function(o){ return beforeIds.indexOf(o.id)<0; });
          if(added && origOrder){
            origOrder.number = added.number;
            origOrder.client = added.client;
            origOrder.product = added.product;
            origOrder.quantity = added.quantity;
            origOrder.deadline = added.deadline;
            origOrder.operations = added.operations;
            origOrder.status = origStatus;
            var idx = state.orders.indexOf(added);
            if(idx>=0) state.orders.splice(idx,1);
            try{ saveSnapshot(); }catch(e){}
            try{ renderOrders(); }catch(e){}
          }
          window._editingOrderId = null;
        }, 0);
        return r;
      };
      window._saveOrderEditPatched = true;
    }
    // ===== Order search box (added) =====
    window._orderSearch = window._orderSearch || '';
    window.applyOrderSearch = function(){
      var q = (window._orderSearch||'').trim().toLowerCase();
      var tables = Array.prototype.slice.call(document.querySelectorAll('table'));
      var table = tables.find(function(t){ var th=t.querySelector('thead'); return th && th.textContent.toLowerCase().indexOf('\u043d\u043e\u043c\u0435\u0440')>=0; }) || tables.find(function(t){ return t.querySelector('tbody'); });
      if(!table) return;
      var rows = Array.prototype.slice.call(table.querySelectorAll('tbody tr'));
      rows.forEach(function(tr){
        if(!q){ tr.style.display=''; return; }
        tr.style.display = tr.textContent.toLowerCase().indexOf(q)>=0 ? '' : 'none';
      });
    };
    window.injectOrderSearch = function(){
      var selects = Array.prototype.slice.call(document.querySelectorAll('select')).filter(function(s){return s.offsetParent!==null;});
      if(selects.length<2) return;
      var bar = selects[0].parentElement;
      while(bar && !bar.contains(selects[1])) bar = bar.parentElement;
      if(!bar || !bar.parentElement) return;
      var existing = bar.parentElement.querySelector('.js-order-search');
      if(existing){ existing.value = window._orderSearch||''; return; }
      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'form-input js-order-search';
      input.placeholder = '\u{1f50d} \u041f\u043e\u0448\u0443\u043a \u043d\u0430\u0440\u044f\u0434\u0443 (\u043d\u043e\u043c\u0435\u0440, \u043a\u043e\u043d\u0442\u0440\u0430\u0433\u0435\u043d\u0442, \u0442\u043e\u0432\u0430\u0440, \u0446\u0435\u0445)...';
      input.style.width = '100%';
      input.style.marginBottom = '12px';
      input.value = window._orderSearch||'';
      input.addEventListener('input', function(){ window._orderSearch = input.value; window.applyOrderSearch(); });
      bar.parentElement.insertBefore(input, bar);
    };
    if(!window._orderSearchRenderPatched && typeof renderOrders==='function'){
      var _origRenderOrdersSearch = renderOrders;
      renderOrders = function(){
        var r = _origRenderOrdersSearch.apply(this, arguments);
        setTimeout(function(){ try{ window.injectOrderSearch(); window.applyOrderSearch(); }catch(e){} }, 40);
        return r;
      };
      window._orderSearchRenderPatched = true;
    }




    /* --- Operations filter override for Production page --- */
    (function(){
      if(window._renderProductionOpPatch) return; window._renderProductionOpPatch=true;
      var RECV='\u041f\u0440\u0438\u0439\u043d\u044f\u0442\u0442\u044f \u043d\u0430 \u0441\u043a\u043b\u0430\u0434';
      function currentStage(o){var ops=o.operations||[];for(var i=0;i<ops.length;i++){if(!ops[i].done)return ops[i].workshop;}return RECV;}
      window.renderProduction = function(){
        var orders = state.orders || [];
        var opSet=[]; var seen={};
        orders.forEach(function(o){ (o.operations||[]).forEach(function(op){ if(op.workshop && !seen[op.workshop]){ seen[op.workshop]=1; opSet.push(op.workshop);} }); });
        if(!seen[RECV]){ opSet.push(RECV); seen[RECV]=1; }
        var models = Array.from(new Set(orders.map(function(o){return o.product;}).filter(Boolean)));
        var filterOp = window._prodFilterOp || '';
        var filterModel = window._prodFilterModel || '';
        var matchFn = function(o){ return (!filterOp || currentStage(o)===filterOp) && (!filterModel||o.product===filterModel); };
        var active = orders.filter(function(o){ return !o.received && matchFn(o); });
        var done = orders.filter(function(o){ return o.received && (!filterModel||o.product===filterModel); });
        var opOpts = opSet.map(function(c){return '<option value="'+c+'" '+(filterOp===c?'selected':'')+'>'+c+'</option>';}).join('');
        var modelOpts = models.map(function(m){return '<option value="'+m+'" '+(filterModel===m?'selected':'')+'>'+m+'</option>';}).join('');
        var html = '<div class="page-header"><h2>\u2699\ufe0f \u0412\u0438\u0440\u043e\u0431\u043d\u0438\u0446\u0442\u0432\u043e</h2></div>';
        html += '<div class="form-row" style="margin-bottom:12px;gap:8px;">';
        html += '<select class="form-select" style="flex:1" onchange="window._prodFilterOp=this.value;renderProduction()"><option value="">\u2014 \u0412\u0441\u0456 \u043e\u043f\u0435\u0440\u0430\u0446\u0456\u0457 \u2014</option>'+opOpts+'</select>';
        html += '<select class="form-select" style="flex:1" onchange="window._prodFilterModel=this.value;renderProduction()"><option value="">\u2014 \u0412\u0441\u0456 \u043c\u043e\u0434\u0435\u043b\u0456 \u2014</option>'+modelOpts+'</select>';
        html += '</div>';
        html += '<h3 style="margin:0 0 10px;color:var(--text)">\ud83d\udd35 \u0423 \u0432\u0438\u0440\u043e\u0431\u043d\u0438\u0446\u0442\u0432\u0456 ('+active.length+')</h3>';
        if (active.length === 0) {
          html += '<div style="color:var(--text2);margin-bottom:24px">\u041d\u0435\u043c\u0430\u0454 \u0430\u043a\u0442\u0438\u0432\u043d\u0438\u0445 \u043d\u0430\u0440\u044f\u0434\u0456\u0432</div>';
        } else {
          html += '<div style="display:grid;gap:10px;margin-bottom:24px">';
          active.forEach(function(o){
            var ops = o.operations || []; var total = ops.length;
            var doneCnt = ops.filter(function(op){return op.done;}).length;
            var allOpsDone = total > 0 && doneCnt === total;
            var firstPending = -1;
            for (var i=0;i<ops.length;i++){ if(!ops[i].done){ firstPending=i; break; } }
            var opsHtml = ops.map(function(op, idx){
              var st = op.done ? 'done' : (idx===firstPending ? 'active' : 'wait');
              var cls = st==='done'?'badge-green':st==='active'?'badge-blue':'badge-gray';
              var icon = st==='done'?'\u2705':st==='active'?'\u23f3':'\u23f8\ufe0f';
              return '<span class="badge '+cls+'" style="margin:2px">'+icon+' '+op.workshop+'</span>';
            }).join('');
            var recvCls = allOpsDone ? 'badge-blue' : 'badge-gray';
            var recvIcon = allOpsDone ? '\u23f3' : '\u23f8\ufe0f';
            opsHtml += '<span class="badge '+recvCls+'" style="margin:2px">'+recvIcon+' '+RECV+'</span>';
            var pct = total > 0 ? Math.round(doneCnt/total*100) : 0;
            html += '<div class="card" style="padding:14px;cursor:pointer" onclick="openOrderView(\''+o.id+'\')">';
            html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
            html += '<div style="font-weight:700;font-size:15px">'+o.number+' \u00b7 '+(o.product||'')+'</div>';
            html += '<div style="color:var(--text2);font-size:13px">'+(o.quantity||1)+' \u0448\u0442 \u00b7 '+doneCnt+'/'+total+' \u0446\u0435\u0445\u0456\u0432</div>';
            html += '</div>';
            html += '<div style="height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:'+pct+'%;background:var(--primary)"></div></div>';
            html += '<div style="display:flex;flex-wrap:wrap;gap:2px">'+opsHtml+'</div>';
            html += '</div>';
          });
          html += '</div>';
        }
        html += '<h3 style="margin:0 0 10px;color:var(--text)">\u2705 \u0417\u0430\u0432\u0435\u0440\u0448\u0435\u043d\u043e ('+done.length+')</h3>';
        if (done.length === 0) {
          html += '<div style="color:var(--text2)">\u041d\u0435\u043c\u0430\u0454 \u0437\u0430\u0432\u0435\u0440\u0448\u0435\u043d\u0438\u0445</div>';
        } else {
          html += '<table class="data-table"><thead><tr><th>\u041d\u0430\u0440\u044f\u0434</th><th>\u0422\u043e\u0432\u0430\u0440</th><th>\u041a-\u0441\u0442\u044c</th><th>\u041f\u0440\u0438\u0439\u043d\u044f\u0442\u043e</th></tr></thead><tbody>';
          done.forEach(function(o){ html += '<tr style="cursor:pointer" onclick="openOrderView(\''+o.id+'\')"><td>'+o.number+'</td><td>'+(o.product||'')+'</td><td>'+(o.quantity||1)+'</td><td>'+(o.receivedDate||o.date||'')+'</td></tr>'; });
          html += '</tbody></table>';
        }
        var c = document.getElementById('page-content'); if(c) c.innerHTML = html;
      };
    })();
</script>
<script>
      /* Кнопка "Видалити" для нарядів */
      (function(){
            window.deleteOrder = async function(id){
                  if(!confirm('Видалити цей наряд?')) return;
                  try { state.orders = (state.orders||[]).filter(function(o){ return String(o.id) !== String(id); });
                       if(typeof saveSnapshot==='function') await saveSnapshot();
                       if(typeof renderOrders==='function') renderOrders();
                       if(typeof showNotif==='function') showNotif('Наряд видалено','success');
                      } catch(e){ if(typeof showNotif==='function') showNotif('Помилка видалення','error'); console.error(e); }
            };
            var origInject = window.injectOrderActionButtons;
            window.injectOrderActionButtons = function(){
                  if(typeof origInject==='function') origInject.apply(this, arguments);
                  var openBtns = Array.prototype.slice.call(document.querySelectorAll('button')).filter(function(b){ return b.textContent.trim()==='Відкрити'; });
                  openBtns.forEach(function(openBtn){
                        var oc = openBtn.getAttribute('onclick')||'';
                        var m = oc.match(/openOrderView\((\d+)\)/);
                        if(!m) return;
                        var id = m[1];
                        var cell = openBtn.parentElement;
                        if(!cell || cell.querySelector('.js-del-btn')) return;
                        var del = document.createElement('button');
                        del.className='btn btn-danger btn-sm js-del-btn';
                        del.textContent='Видалити';
                        del.style.marginTop='6px';
                        del.setAttribute('onclick','deleteOrder('+id+')');
                        cell.appendChild(del);
                  });
            };
            if(typeof window.injectOrderActionButtons==='function'){ try { window.injectOrderActionButtons(); } catch(e){} }
      })();
</script>

<script>
      /* UI: іконки для дій + клік по рядку (Наряди, Товари, Прихід/Видаток) */
      (function(){
              var EDIT='✏️', DUP='⧉', DEL='🗑️';
              function iconify(btn, icon, title, danger){
                        btn.textContent=icon;
                        btn.title=title;
                        btn.className='btn btn-sm'+(danger?' btn-danger':'')+' js-icon-btn';
                        btn.style.cssText='margin:0 2px;padding:5px 8px;line-height:1;';
              }
              function makeClickable(container, runCode, actionEls){
                        if(!container || container.dataset.rowClick) return;
                        container.dataset.rowClick='1';
                        container.style.cursor='pointer';
                        container.addEventListener('click', function(ev){
                                    for(var i=0;i<actionEls.length;i++){ if(actionEls[i] && actionEls[i].contains(ev.target)) return; }
                                    if(ev.target.closest && ev.target.closest('button,a,input,select,textarea,label')) return;
                                    try { (0,eval)(runCode); } catch(e){ console.error(e); }
                        });
              }
              function enhanceOrders(){
                        Array.prototype.slice.call(document.querySelectorAll('button')).forEach(function(b){
                                    var m=(b.getAttribute('onclick')||'').match(/^openOrderView\((\d+)\)/); if(!m) return;
                                    var cell=b.parentElement; if(cell && !cell.querySelector('button[onclick^="deleteOrder"]')){
                                                  var del=document.createElement('button'); del.setAttribute('onclick','deleteOrder('+m[1]+')'); cell.appendChild(del);
                                    }
                        });
                        Array.prototype.slice.call(document.querySelectorAll('button')).forEach(function(b){
                                    var oc=b.getAttribute('onclick')||'';
                                    if(/^editOrder\(/.test(oc)) iconify(b,EDIT,'Редагувати',false);
                                    else if(/^duplicateOrder\(/.test(oc)) iconify(b,DUP,'Дублювати',false);
                                    else if(/^deleteOrder\(/.test(oc)) iconify(b,DEL,'Видалити',true);
                        });
                        Array.prototype.slice.call(document.querySelectorAll('button')).forEach(function(b){
                                    var m=(b.getAttribute('onclick')||'').match(/^openOrderView\((\d+)\)/); if(!m) return;
                                    var tr=b.closest('tr'); var cell=b.closest('td');
                                    if(cell){ cell.style.whiteSpace='nowrap'; cell.style.textAlign='right'; cell.style.width='1%'; }
                                    if(tr) makeClickable(tr, 'openOrderView('+m[1]+')', [cell]);
                                    b.remove();
                        });
              }
              function enhanceByEdit(editRe, getContainer){
                        Array.prototype.slice.call(document.querySelectorAll('button')).forEach(function(b){
                                    var oc=b.getAttribute('onclick')||'';
                                    if(editRe.test(oc)){
                                                  if(b.textContent.trim()!==EDIT) iconify(b,EDIT,'Редагувати',false);
                                                  var container=getContainer(b);
                                                  var cell=b.closest('td');
                                                  makeClickable(container, oc, [cell || b.parentElement]);
                                    }
                        });
              }
              function enhanceProducts(){
                        enhanceByEdit(/^editProduct\(/, function(b){ return b.closest('tr') || b.closest('.item-card'); });
                        Array.prototype.slice.call(document.querySelectorAll('button[onclick^="deleteProduct"]')).forEach(function(b){ if(b.textContent.trim()!==DEL) iconify(b,DEL,'Видалити',true); });
              }
              function enhanceOperations(){
                        enhanceByEdit(/^editOperation\(/, function(b){ return b.closest('tr'); });
                        Array.prototype.slice.call(document.querySelectorAll('button[onclick^="deleteOperation"]')).forEach(function(b){ if(b.textContent.trim()!==DEL) iconify(b,DEL,'Видалити',true); });
              }
              function enhanceAll(){
                        try{ enhanceOrders(); }catch(e){}
                        try{ enhanceProducts(); }catch(e){}
                        try{ enhanceOperations(); }catch(e){}
    try{ wrapTables(); }catch(e){}
              }
            function wrapTables(){
                    var tables = document.querySelectorAll('#page-content table');
                    Array.prototype.slice.call(tables).forEach(function(t){
                              var p = t.parentElement;
setInterval(sched,700);                              var wrap = document.createElement('div');
                              wrap.className='js-table-scroll';
            setInterval(function(){try{av();}catch(e){}},700);                  wrap.style.cssText='overflow-x:auto;max-width:100%;';
                              t.parentNode.insertBefore(wrap, t);
                              wrap.appendChild(t);
                    });
            }
            window.__enhanceAll = enhanceAll;
              var origInject = window.injectOrderActionButtons;
              window.injectOrderActionButtons = function(){ if(typeof origInject==='function') origInject.apply(this,arguments); enhanceAll(); };
              function start(){
                        var pc = document.getElementById('page-content') || document.body;
                        var obs = new MutationObserver(function(){ clearTimeout(window.__enhT); window.__enhT=setTimeout(enhanceAll, 30); });
                        obs.observe(pc, {childList:true, subtree:true});
                        enhanceAll();
              }
              if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', start); else start();
      })();
</script>
