<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вампір: Маскарад 5 — Чарлист</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="sheet">
        <h1>Вампір: Маскарад 5</h1>
        <p class="subtitle">Український чарлист (цифрова форма)</p>

        <form id="character-form">
            <section>
                <h2>Основне</h2>
                <div class="grid cols-3">
                    <label>Ім'я <input type="text" name="name"></label>
                    <label>Концепт <input type="text" name="concept"></label>
                    <label>Тип хижака <input type="text" name="predator_type"></label>
                    <label>Хроніка <input type="text" name="chronicle"></label>
                    <label>Амбіція <input type="text" name="ambition"></label>
                    <label>Клан <input type="text" name="clan"></label>
                    <label>Сір <input type="text" name="sire"></label>
                    <label>Бажання <input type="text" name="desire"></label>
                    <label>Покоління <input type="text" name="generation"></label>
                </div>
            </section>

            <section>
                <h2>Характеристики (0–5)</h2>
                <div class="grid cols-3">
                    <fieldset>
                        <legend>Фізичні</legend>
                        <label>Міць <input type="number" min="0" max="5" name="attr_strength" value="1"></label>
                        <label>Спритність <input type="number" min="0" max="5" name="attr_dexterity" value="1"></label>
                        <label>Витривалість <input type="number" min="0" max="5" name="attr_stamina" value="1"></label>
                    </fieldset>
                    <fieldset>
                        <legend>Соціальні</legend>
                        <label>Харизма <input type="number" min="0" max="5" name="attr_charisma" value="1"></label>
                        <label>Маніпуляція <input type="number" min="0" max="5" name="attr_manipulation" value="1"></label>
                        <label>Витримка <input type="number" min="0" max="5" name="attr_composure" value="1"></label>
                    </fieldset>
                    <fieldset>
                        <legend>Ментальні</legend>
                        <label>Інтелект <input type="number" min="0" max="5" name="attr_intelligence" value="1"></label>
                        <label>Кмітливість <input type="number" min="0" max="5" name="attr_wits" value="1"></label>
                        <label>Рішучість <input type="number" min="0" max="5" name="attr_resolve" value="1"></label>
                    </fieldset>
                </div>
            </section>

            <section>
                <h2>Навички (0–5)</h2>
                <div class="grid cols-3 skills">
                    <label>Атлетизм <input type="number" min="0" max="5" name="skill_athletics" value="0"></label>
                    <label>Виступ <input type="number" min="0" max="5" name="skill_performance" value="0"></label>
                    <label>Знання <input type="number" min="0" max="5" name="skill_academics" value="0"></label>
                    <label>Боротьба <input type="number" min="0" max="5" name="skill_brawl" value="0"></label>
                    <label>Вуличний досвід <input type="number" min="0" max="5" name="skill_streetwise" value="0"></label>
                    <label>Медицина <input type="number" min="0" max="5" name="skill_medicine" value="0"></label>
                    <label>Виживання <input type="number" min="0" max="5" name="skill_survival" value="0"></label>
                    <label>Етикет <input type="number" min="0" max="5" name="skill_etiquette" value="0"></label>
                    <label>Наука <input type="number" min="0" max="5" name="skill_science" value="0"></label>
                    <label>Керування <input type="number" min="0" max="5" name="skill_drive" value="0"></label>
                    <label>Залякування <input type="number" min="0" max="5" name="skill_intimidation" value="0"></label>
                    <label>Окультизм <input type="number" min="0" max="5" name="skill_occult" value="0"></label>
                    <label>Крадійство <input type="number" min="0" max="5" name="skill_larceny" value="0"></label>
                    <label>Лідерство <input type="number" min="0" max="5" name="skill_leadership" value="0"></label>
                    <label>Політика <input type="number" min="0" max="5" name="skill_politics" value="0"></label>
                    <label>Непомітність <input type="number" min="0" max="5" name="skill_stealth" value="0"></label>
                    <label>Переконливість <input type="number" min="0" max="5" name="skill_persuasion" value="0"></label>
                    <label>Розслідування <input type="number" min="0" max="5" name="skill_investigation" value="0"></label>
                    <label>Ремесло <input type="number" min="0" max="5" name="skill_craft" value="0"></label>
                    <label>Проникливість <input type="number" min="0" max="5" name="skill_insight" value="0"></label>
                    <label>Спостережливість <input type="number" min="0" max="5" name="skill_awareness" value="0"></label>
                    <label>Рукопашний бій <input type="number" min="0" max="5" name="skill_melee" value="0"></label>
                    <label>Розуміння тварин <input type="number" min="0" max="5" name="skill_animal_ken" value="0"></label>
                    <label>Технології <input type="number" min="0" max="5" name="skill_technology" value="0"></label>
                    <label>Стрільба <input type="number" min="0" max="5" name="skill_firearms" value="0"></label>
                    <label>Хитрість <input type="number" min="0" max="5" name="skill_subterfuge" value="0"></label>
                    <label>Фінанси <input type="number" min="0" max="5" name="skill_finance" value="0"></label>
                </div>
            </section>

            <section>
                <h2>Дисципліни, переваги та примітки</h2>
                <div class="grid cols-2">
                    <label>Дисципліни <textarea name="disciplines" rows="6" placeholder="Наприклад: Присутність 2, Домінація 1..."></textarea></label>
                    <label>Переваги й вади <textarea name="advantages_flaws" rows="6"></textarea></label>
                    <label>Опори й переконання <textarea name="convictions" rows="4"></textarea></label>
                    <label>Кланове прокляття <textarea name="clan_bane" rows="4"></textarea></label>
                    <label>Історія <textarea name="history" rows="6"></textarea></label>
                    <label>Примітки <textarea name="notes" rows="6"></textarea></label>
                </div>
            </section>

            <section>
                <h2>Ресурси та треки</h2>
                <div class="grid cols-3">
                    <label>Здоров'я (0–10) <input type="number" min="0" max="10" name="health" value="3"></label>
                    <label>Сила волі (0–10) <input type="number" min="0" max="10" name="willpower" value="3"></label>
                    <label>Голод (0–5) <input type="number" min="0" max="5" name="hunger" value="1"></label>
                    <label>Людяність (0–10) <input type="number" min="0" max="10" name="humanity" value="7"></label>
                    <label>Сила Крові (0–10) <input type="number" min="0" max="10" name="blood_potency" value="1"></label>
                    <label>Резонанс <input type="text" name="resonance"></label>
                </div>
            </section>

            <div class="actions">
                <button type="submit">Зберегти персонажа</button>
                <button type="button" id="clear-btn" class="secondary">Очистити форму</button>
            </div>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
