<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Sheet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #e0e0e0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .slider-row {
            display: grid;
            grid-template-columns: 140px 1fr 36px;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .slider-row label {
            margin-bottom: 0;
        }
        .slider-value {
            text-align: right;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="form-title">D20 Character Sheet</h1>
        <form>
            <!-- General Information -->
            <div class="form-group">
                <label for="playerName">Player Name</label>
                <input type="text" id="playerName" class="form-control">
            </div>
            <div class="form-group">
                <label for="characterName">Character Name</label>
                <input type="text" id="characterName" class="form-control">
            </div>
            <div class="form-group">
                <label for="classSubclass">Class & Subclass</label>
                <input type="text" id="classSubclass" class="form-control">
            </div>
            <div class="form-group">
                <label for="ancestryBackground">Ancestry & Background</label>
                <input type="text" id="ancestryBackground" class="form-control">
            </div>
            <div class="form-group">
                <label for="level">Level</label>
                <input type="number" id="level" class="form-control">
            </div>

            <!-- Attributes -->
            <div class="form-group">
                <label class="mb-2">Attributes (1-10)</label>
                <div class="slider-row">
                    <label for="might">Might</label>
                    <input type="range" id="might" class="form-range score-slider" min="1" max="10" value="5">
                    <span class="slider-value" id="mightValue">5</span>
                </div>
                <div class="slider-row">
                    <label for="agility">Agility</label>
                    <input type="range" id="agility" class="form-range score-slider" min="1" max="10" value="5">
                    <span class="slider-value" id="agilityValue">5</span>
                </div>
                <div class="slider-row">
                    <label for="charisma">Charisma</label>
                    <input type="range" id="charisma" class="form-range score-slider" min="1" max="10" value="5">
                    <span class="slider-value" id="charismaValue">5</span>
                </div>
                <div class="slider-row">
                    <label for="intelligence">Intelligence</label>
                    <input type="range" id="intelligence" class="form-range score-slider" min="1" max="10" value="5">
                    <span class="slider-value" id="intelligenceValue">5</span>
                </div>
            </div>

            <!-- Skills -->
            <div class="form-group">
                <label class="mb-2">Skills (1-10)</label>
                <div class="slider-row">
                    <label for="athletics">Athletics</label>
                    <input type="range" id="athletics" class="form-range score-slider" min="1" max="10" value="5">
                    <span class="slider-value" id="athleticsValue">5</span>
                </div>
                <div class="slider-row">
                    <label for="acrobatics">Acrobatics</label>
                    <input type="range" id="acrobatics" class="form-range score-slider" min="1" max="10" value="5">
                    <span class="slider-value" id="acrobaticsValue">5</span>
                </div>
                <div class="slider-row">
                    <label for="stealth">Stealth</label>
                    <input type="range" id="stealth" class="form-range score-slider" min="1" max="10" value="5">
                    <span class="slider-value" id="stealthValue">5</span>
                </div>
                <div class="slider-row">
                    <label for="arcana">Arcana</label>
                    <input type="range" id="arcana" class="form-range score-slider" min="1" max="10" value="5">
                    <span class="slider-value" id="arcanaValue">5</span>
                </div>
                <div class="slider-row">
                    <label for="history">History</label>
                    <input type="range" id="history" class="form-range score-slider" min="1" max="10" value="5">
                    <span class="slider-value" id="historyValue">5</span>
                </div>
                <div class="slider-row">
                    <label for="nature">Nature</label>
                    <input type="range" id="nature" class="form-range score-slider" min="1" max="10" value="5">
                    <span class="slider-value" id="natureValue">5</span>
                </div>
                <div class="slider-row">
                    <label for="insight">Insight</label>
                    <input type="range" id="insight" class="form-range score-slider" min="1" max="10" value="5">
                    <span class="slider-value" id="insightValue">5</span>
                </div>
                <div class="slider-row">
                    <label for="medicine">Medicine</label>
                    <input type="range" id="medicine" class="form-range score-slider" min="1" max="10" value="5">
                    <span class="slider-value" id="medicineValue">5</span>
                </div>
                <div class="slider-row">
                    <label for="survival">Survival</label>
                    <input type="range" id="survival" class="form-range score-slider" min="1" max="10" value="5">
                    <span class="slider-value" id="survivalValue">5</span>
                </div>
                <div class="form-group mt-3">
                    <label for="customSkill">Custom Skill</label>
                    <input type="text" id="customSkill" class="form-control" placeholder="Enter custom skill">
                </div>
            </div>

            <!-- Knowledge Trades and Languages -->
            <div class="form-group">
                <label>Knowledge Trades</label>
                <div class="form-check">
                    <input type="checkbox" id="arcanaTrade" class="form-check-input">
                    <label for="arcanaTrade" class="form-check-label">Arcana</label>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="historyTrade" class="form-check-input">
                    <label for="historyTrade" class="form-check-label">History</label>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="natureTrade" class="form-check-input">
                    <label for="natureTrade" class="form-check-label">Nature</label>
                </div>
                <div class="form-group mt-3">
                    <label for="customTrade">Custom Trade</label>
                    <input type="text" id="customTrade" class="form-control" placeholder="Enter custom trade">
                </div>
            </div>

            <div class="form-group">
                <label>Languages</label>
                <div class="form-check">
                    <input type="checkbox" id="commonLanguage" class="form-check-input">
                    <label for="commonLanguage" class="form-check-label">Common</label>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="elvishLanguage" class="form-check-input">
                    <label for="elvishLanguage" class="form-check-label">Elvish</label>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="dwarvishLanguage" class="form-check-input">
                    <label for="dwarvishLanguage" class="form-check-label">Dwarvish</label>
                </div>
                <div class="form-group mt-3">
                    <label for="customLanguage">Custom Language</label>
                    <input type="text" id="customLanguage" class="form-control" placeholder="Enter custom language">
                </div>
            </div>

            <!-- Stamina, Mana, and Hit Points -->
            <div class="form-group">
                <label for="staminaPoints">Stamina Points</label>
                <input type="number" id="staminaPoints" class="form-control">
            </div>
            <div class="form-group">
                <label for="manaPoints">Mana Points</label>
                <input type="number" id="manaPoints" class="form-control">
            </div>
            <div class="form-group">
                <label for="hitPoints">Hit Points</label>
                <input type="number" id="hitPoints" class="form-control">
            </div>

            <!-- Inventory and Features -->
            <div class="form-group">
                <label for="inventory">Inventory</label>
                <textarea id="inventory" class="form-control" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label for="features">Features</label>
                <textarea id="features" class="form-control" rows="4"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Save Character</button>
        </form>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.score-slider').forEach((slider) => {
            const valueTarget = document.getElementById(`${slider.id}Value`);
            if (valueTarget) {
                valueTarget.textContent = slider.value;
            }

            slider.addEventListener('input', () => {
                if (valueTarget) {
                    valueTarget.textContent = slider.value;
                }
            });
        });
    </script>
</body>
</html>
