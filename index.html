<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paolla — Склад та Виробництво</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--sidebar:#161b22;--card:#1c2128;--border:#30363d;--accent:#238636;--accent2:#1f6feb;--text:#e6edf3;--text2:#8b949e;--danger:#da3633;--warning:#e3b341}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
#app{display:flex;width:100%;min-height:100vh}
/* Sidebar */
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo h1{font-size:18px;font-weight:700;color:var(--text)}
.logo span{font-size:11px;color:var(--text2);display:block}
nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:8px 16px 4px;font-size:11px;font-weight:600;text-transform:uppercase;color:var(--text2);letter-spacing:0.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border-radius:6px;margin:1px 8px;transition:all 0.2s;font-size:14px;color:var(--text2);border:none;background:none;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:rgba(35,134,54,0.15);color:var(--accent);font-weight:500}
.nav-item .badge{margin-left:auto;background:var(--accent);color:white;border-radius:10px;padding:1px 6px;font-size:11px}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px;cursor:pointer}
.avatar{width:32px;height:32px;background:linear-gradient(135deg,#6e40c9,#1f6feb);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:white}
/* Main */
.main{flex:1;margin-left:240px;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--sidebar);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-size:16px;font-weight:600}
.topbar-actions{display:flex;align-items:center;gap:12px}
.content{padding:24px;flex:1}
/* Cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-card .label{font-size:12px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:28px;font-weight:700;margin-bottom:4px}
.stat-card .sub{font-size:12px;color:var(--text2)}
.stat-card.green .value{color:var(--accent)}
.stat-card.blue .value{color:var(--accent2)}
.stat-card.yellow .value{color:var(--warning)}
.stat-card.red .value{color:var(--danger)}
/* Buttons */
.btn{padding:8px 16px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:14px;font-weight:500;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);border-color:var(--accent);color:white}
.btn-primary:hover{background:#2ea043;border-color:#2ea043}
.btn-secondary{background:var(--card);color:var(--text)}
.btn-secondary:hover{background:#22272e;border-color:#8b949e}
.btn-danger{background:var(--danger);border-color:var(--danger);color:white}
.btn-sm{padding:5px 10px;font-size:12px}
/* Tables */
.table-container{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.table-header h3{font-size:15px;font-weight:600}
.table-search{display:flex;gap:8px;align-items:center}
.search-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-size:13px;width:220px}
.search-input:focus{outline:none;border-color:var(--accent2)}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 16px;text-align:left;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);background:var(--sidebar)}
tbody td{padding:12px 16px;font-size:14px;border-bottom:1px solid rgba(48,54,61,0.5)}
tbody tr:hover{background:rgba(255,255,255,0.02)}
tbody tr:last-child td{border-bottom:none}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:12px;font-weight:500}
.badge-green{background:rgba(35,134,54,0.15);color:#3fb950;border:1px solid rgba(63,185,80,0.3)}
.badge-blue{background:rgba(31,111,235,0.15);color:#58a6ff;border:1px solid rgba(88,166,255,0.3)}
.badge-yellow{background:rgba(227,179,65,0.15);color:#e3b341;border:1px solid rgba(227,179,65,0.3)}
.badge-red{background:rgba(218,54,51,0.15);color:#f85149;border:1px solid rgba(248,81,73,0.3)}
.badge-gray{background:rgba(139,148,158,0.15);color:#8b949e;border:1px solid rgba(139,148,158,0.3)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:540px;max-width:95vw;max-height:85vh;overflow:auto}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px;font-weight:600}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:14px}
.form-input:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 3px rgba(31,111,235,0.1)}
.form-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* Auth */
#auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:999}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:400px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo .icon{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px}
.auth-logo h1{font-size:24px;font-weight:700}
.auth-logo p{color:var(--text2);font-size:14px;margin-top:4px}
.auth-tabs{display:flex;background:var(--bg);border-radius:8px;padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:8px;text-align:center;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all 0.2s}
.auth-tab.active{background:var(--card);color:var(--text)}
/* Progress */
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width 0.3s}
/* Charts */
.chart-container{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.chart-title{font-size:15px;font-weight:600;margin-bottom:16px}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:120px}
.chart-bar{flex:1;background:linear-gradient(to top,var(--accent),var(--accent2));border-radius:4px 4px 0 0;min-height:4px;transition:height 0.3s}
.chart-labels{display:flex;gap:8px;margin-top:8px}
.chart-label{flex:1;text-align:center;font-size:11px;color:var(--text2)}
/* Notification */
.notification{position:fixed;top:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;z-index:2000;display:flex;align-items:center;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,0.4);animation:slideIn 0.3s ease}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.notification.success{border-color:rgba(63,185,80,0.4)}
.notification.error{border-color:rgba(248,81,73,0.4)}
/* Tabs */
.page-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:24px}
.page-tab{padding:10px 16px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s}
.page-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* Timeline */
.timeline{display:flex;flex-direction:column;gap:0}
.timeline-item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid rgba(48,54,61,0.5)}
.timeline-dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0}
.timeline-dot.green{background:var(--accent)}
.timeline-dot.blue{background:var(--accent2)}
.timeline-dot.yellow{background:var(--warning)}
.timeline-dot.red{background:var(--danger)}
.timeline-info{flex:1}
.timeline-title{font-size:14px;font-weight:500;margin-bottom:2px}
.timeline-sub{font-size:12px;color:var(--text2)}
.timeline-time{font-size:12px;color:var(--text2);white-space:nowrap}
/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state .icon{font-size:48px;margin-bottom:16px}
.empty-state h3{font-size:16px;color:var(--text);margin-bottom:8px}
/* View toggle */
.view-toggle{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px}
.view-toggle button{background:none;border:none;color:var(--text2);cursor:pointer;padding:5px 9px;border-radius:6px;font-size:14px;line-height:1;display:flex;align-items:center;transition:all 0.2s}
.view-toggle button:hover{color:var(--text)}
.view-toggle button.active{background:var(--card);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,0.3)}
/* Card grid (rounded squares) */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:8px;transition:all 0.2s;position:relative}
.item-card:hover{border-color:#8b949e;transform:translateY(-2px)}
.item-card .ic-thumb{width:100%;aspect-ratio:1/1;border-radius:12px;background:linear-gradient(135deg,rgba(35,134,54,0.15),rgba(31,111,235,0.15));display:flex;align-items:center;justify-content:center;font-size:42px;margin-bottom:4px}
.item-card .ic-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.item-card .ic-meta{font-size:12px;color:var(--text2);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.item-card .ic-actions{display:flex;gap:6px;margin-top:auto;padding-top:4px}
.item-card .ic-actions .btn{flex:1;justify-content:center}
/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Responsive */
@media(max-width:768px){.sidebar{width:200px}.main{margin-left:200px}.stats-grid{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}}
@media(max-width:600px){.sidebar{transform:translateX(-100%);transition:transform 0.3s}.sidebar.open{transform:translateX(0)}.main{margin-left:0}}
</style>
</head>
<body>
<!-- Auth Screen -->
<div id="auth-screen">
<div class="auth-card">
<div class="auth-logo">
<div class="icon">🏭</div>
<h1>Paolla</h1>
<p>Склад та Виробництво</p>
</div>
<div class="auth-tabs">
<div class="auth-tab active" onclick="switchAuthTab('login')">Вхід</div>
<div class="auth-tab" onclick="switchAuthTab('register')">Реєстрація</div>
</div>
<div id="login-form">
<div class="form-group">
<label class="form-label">Email</label>
<input type="email" class="form-input" id="login-email" placeholder="your@email.com">
</div>
<div class="form-group">
<label class="form-label">Пароль</label>
<input type="password" class="form-input" id="login-password" placeholder="••••••••">
</div>
<button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" onclick="loginUser()">Увійти</button>
</div>
<div id="register-form" style="display:none">
<div class="form-group">
<label class="form-label">Ім'я</label>
<input type="text" class="form-input" id="reg-name" placeholder="Ваше ім'я">
</div>
<div class="form-group">
<label class="form-label">Email</label>
<input type="email" class="form-input" id="reg-email" placeholder="your@email.com">
</div>
<div class="form-group">
<label class="form-label">Пароль</label>
<input type="password" class="form-input" id="reg-password" placeholder="••••••••">
</div>
<button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" onclick="registerUser()">Зареєструватись</button>
</div>
</div>
</div>

<!-- Main App -->
<div id="app" style="display:none">
<aside class="sidebar" id="sidebar">
<div class="logo">
<div class="logo-icon">🏭</div>
<div>
<h1>Paolla</h1>
<span>Управління складом</span>
</div>
</div>
<nav>
<div class="nav-section">Головне</div>
<button class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
📊 Дашборд
</button>
<div class="nav-section">Склад</div>
<button class="nav-item" onclick="navigate('products')" id="nav-products">
📦 Товари/матеріали
</button>
<button class="nav-item" onclick="navigate('incoming')" id="nav-incoming">
⬇️ Прихід товарів
</button>
<button class="nav-item" onclick="navigate('outgoing')" id="nav-outgoing">
⬆️ Видаток товарів
</button>
<button class="nav-item" onclick="navigate('inventory')" id="nav-inventory">
🗂️ Залишки
</button>
<div class="nav-section">Виробництво</div>
<button class="nav-item" onclick="navigate('orders')" id="nav-orders">
📋 Замовлення
</button>
<button class="nav-item" onclick="navigate('recipes')" id="nav-recipes">
📝 Рецепти
</button>
<button class="nav-item" onclick="navigate('production')" id="nav-production">
⚙️ Виробництво
</button>
<div class="nav-section">Звіти</div>
<button class="nav-item" onclick="navigate('reports')" id="nav-reports">
📈 Звіти
</button>
<div class="nav-section">Налаштування</div>
<button class="nav-item" onclick="navigate('warehouse')" id="nav-warehouse">
🏠 Склади
</button>
<button class="nav-item" onclick="navigate('team')" id="nav-team">
👥 Команда
</button>
</nav>
<div class="sidebar-footer">
<div class="user-info" onclick="navigate('profile')">
<div class="avatar" id="user-avatar">?</div>
<div>
<div style="font-size:13px;font-weight:500" id="user-name">Користувач</div>
<div style="font-size:11px;color:var(--text2)" id="user-role">Менеджер</div>
</div>
</div>
</div>
</aside>

<main class="main">
<div class="topbar">
<div style="display:flex;align-items:center;gap:12px">
<div class="page-title" id="page-title">Дашборд</div>
</div>
<div class="topbar-actions">
<span style="font-size:12px;color:var(--text2)" id="warehouse-name">Склад</span>
<button class="btn btn-secondary btn-sm" onclick="logoutUser()">Вийти</button>
</div>
</div>
<div class="content" id="page-content">
<div class="loading"><div class="spinner"></div>Завантаження...</div>
</div>
</main>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
<div class="modal" onclick="event.stopPropagation()">
<div class="modal-header">
<h3 id="modal-title">Модальне вікно</h3>
<button class="btn btn-secondary btn-sm" onclick="closeModal()">✕</button>
</div>
<div class="modal-body" id="modal-body"></div>
<div class="modal-footer" id="modal-footer"></div>
</div>
</div>

<!-- Notification -->
<div id="notification" style="display:none" class="notification">
<span id="notif-icon">✅</span>
<span id="notif-text">Успішно!</span>
</div>

<script>
// ====== CONFIG ======
const SUPABASE_URL = 'https://huzqgxfklegghzkgryoh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1enFneGZrbGVnZ2h6a2dyeW9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Mzk0NDYsImV4cCI6MjA5NzIxNTQ0Nn0.fUXyXr49ZW7zsumsTwKON0IcCQGIV0Ma8hjPtP-NgGg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ====== STATE ======
let state = {
  user: null,
  warehouse: null,
  products: [],
  operations: [],
  orders: [],
  recipes: [],
  production: [],
  members: [],
  currentPage: 'dashboard',
  productView: (typeof localStorage!=='undefined' && localStorage.getItem('paolla_productView')) || 'list',
  productionView: (typeof localStorage!=='undefined' && localStorage.getItem('paolla_productionView')) || 'list'
};

// ====== AUTH ======
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
}

async function loginUser() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showNotif('Заповніть всі поля', 'error');
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return showNotif(error.message, 'error');
  await initApp(data.user);
}

async function registerUser() {
  const name = document.getElementById('reg-name').value;
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) return showNotif('Заповніть всі поля', 'error');
  const { data, error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
  if (error) return showNotif(error.message, 'error');
  showNotif('Перевірте email для підтвердження', 'success');
}

async function logoutUser() {
  await sb.auth.signOut();
  state = { user: null, warehouse: null, products: [], operations: [], orders: [], recipes: [], production: [], members: [], currentPage: 'dashboard' };
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ====== INIT ======
async function initApp(user) {
  state.user = user;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const name = user.user_metadata?.full_name || user.email.split('@')[0];
  document.getElementById('user-name').textContent = name;
  document.getElementById('user-avatar').textContent = name[0].toUpperCase();
  await loadWarehouse();
  await loadData();
  navigate('dashboard');
}

async function loadWarehouse() {
  const { data: member } = await sb.from('warehouse_members').select('warehouse_id, role').eq('user_id', state.user.id).single();
  if (member) {
    const { data: wh } = await sb.from('warehouses').select('*').eq('id', member.warehouse_id).single();
    state.warehouse = wh;
    document.getElementById('user-role').textContent = member.role || 'Менеджер';
    // Load snapshot
    const { data: snap } = await sb.from('warehouse_snapshots').select('payload').eq('warehouse_id', member.warehouse_id).single();
    if (snap?.payload) {
      try {
        const decoded = JSON.parse(atob(snap.payload.split('.')[1]));
        if (decoded.products) state.products = decoded.products;
        if (decoded.operations) state.operations = decoded.operations;
        if (decoded.orders) state.orders = decoded.orders;
        if (decoded.recipes) state.recipes = decoded.recipes;
        if (decoded.production) state.production = decoded.production;
      } catch(e) { console.log('Snapshot parse error:', e); }
    }
    document.getElementById('warehouse-name').textContent = wh?.name || 'Склад #' + member.warehouse_id.substring(0,8);
  } else {
    // Create warehouse for user

async function saveSnapshot() {

      + '<div class="ic-thumb">📦</div>'
      + '<div class="ic-name">' + p.name + '</div>'
      + '<div class="ic-meta"><span class="badge badge-gray">' + p.category + '</span>' + status + '</div>'
      + '<div class="ic-meta">' + p.quantity + ' ' + p.unit + ' • ' + formatMoney(p.price) + ' грн</div>'

async function saveProduct(id) {
  const p = {
    name: document.getElementById('p-name').value,
    category: document.getElementById('p-category').value || 'Інше',
    unit: document.getElementById('p-unit').value,
    quantity: parseFloat(document.getElementById('p-qty').value) || 0,
    min_qty: parseFloat(document.getElementById('p-min').value) || 0,
    price: parseFloat(document.getElementById('p-price').value) || 0
  };
  if (!p.name) return showNotif('Введіть назву товару', 'error');
  if (id) {
    const idx = state.products.findIndex(x => x.id === id);
    state.products[idx] = { ...state.products[idx], ...p };
  } else {
    p.id = Date.now();
    state.products.push(p);
  }
  await saveSnapshot();
  closeModal();
  renderProducts();
  showNotif('Товар збережено', 'success');
}

async function deleteProduct(id) {
  if (!confirm('Видалити цей товар?')) return;
  state.products = state.products.filter(p => p.id !== id);
  await saveSnapshot();
  renderProducts();
  showNotif('Товар видалено', 'success');
}

function renderOperation(type) {
  var isIncoming = (type === 'incoming');
  var icon = isIncoming ? '⬇️' : '⬆️';
  var title = isIncoming ? 'Прихід товарів' : 'Видаток товарів';
  var btnLabel = isIncoming ? '+ Новий прихід' : '+ Новий видаток';
  var ops = state.operations.filter(function(o) { return o.type === type; });
  var html = '<div class="page-header"><h2>' + icon + ' ' + title + '</h2><button class="btn" id="add-op-btn">' + btnLabel + '</button></div>';
  html += '<table class="data-table"><thead><tr><th>Дата</th><th>Контрагент</th><th>Товари</th><th>Сума (грн)</th><th>Примітки</th><th></th></tr></thead><tbody>';
  if (ops.length === 0) {
    html += '<tr><td colspan="6"><div class="empty-state"><div class="icon">' + icon + '</div><h3>Немає операцій</h3><p>Додайте першу операцію</p></div></td></tr>';
  } else {
    ops.slice().reverse().forEach(function(o) {
      var items = o.items;
      if (!items && o.product_name) {
        items = [{product_id: o.product_id, product_name: o.product_name, quantity: o.quantity, price: o.price}];
      }
      items = items || [];
      var totalAmt = 0;
      var itemsSummary = items.map(function(it) {
        totalAmt += (Number(it.quantity) || 0) * (Number(it.price) || 0);
        return it.product_name + ' ×' + it.quantity;
      }).join('; ');
      var totalStr = totalAmt > 0 ? totalAmt.toFixed(2) : '—';
      var counterparty = o.counterparty || '—';
      html += '<tr>';
      html += '<td>' + (o.date || '—') + '</td>';
      html += '<td>' + counterparty + '</td>';
      html += '<td style="max-width:220px;white-space:normal">' + itemsSummary + '</td>';
      html += '<td>' + totalStr + '</td>';
      html += '<td>' + (o.notes || '—') + '</td>';
      html += '<td><button class="btn btn-sm btn-danger" onclick="deleteOperation(' + o.id + ',&apos;' + type + '&apos;)">✕</button></td>';
      html += '</tr>';
    });
  }
  html += '</tbody></table>';
  document.getElementById('page-content').innerHTML = html;
  var btn = document.getElementById('add-op-btn');
  if (btn) btn.addEventListener('click', function() { openOperationModal(type); });
}

  var dateEl = document.getElementById('op-date');
  var date = dateEl ? dateEl.value : '';
  var notesEl = document.getElementById('op-notes');
  var notes = notesEl ? notesEl.value.trim() : '';

  if (!counterparty) { showNotif('Введіть назву контрагента', 'error'); return; }

  var tbody = document.getElementById('op-items-body');
  var rows = tbody ? tbody.querySelectorAll('tr') : [];
  var items = [];
  var hasError = false;
  rows.forEach(function(tr) {
    if (hasError) return;
    var sel = tr.querySelector('.item-product');
    var qtyInp = tr.querySelector('.item-qty');
    var priceInp = tr.querySelector('.item-price');
    if (!sel || !qtyInp) return;
    var productId = sel.value;
    if (!productId) { hasError = true; showNotif('Оберіть товар у кожному рядку', 'error'); return; }
    var qty = parseFloat(qtyInp.value);
    if (!qty || qty <= 0) { hasError = true; showNotif('Введіть кількість більше 0', 'error'); return; }
    var price = parseFloat(priceInp ? priceInp.value : '') || 0;
    var opt = sel.options[sel.selectedIndex];
    var productName = opt ? (opt.dataset && opt.dataset.name ? opt.dataset.name : opt.text.split('(')[0].trim()) : String(productId);
    items.push({product_id: productId, product_name: productName, quantity: qty, price: price});
  });
  if (hasError) return;
  if (items.length === 0) { showNotif('Додайте хоча б один товар', 'error'); return; }

  items.forEach(function(it) {
    var prod = state.products.find(function(p) { return String(p.id) === String(it.product_id); });
    if (prod) {
      if (type === 'incoming') {
        prod.quantity = (Number(prod.quantity) || 0) + it.quantity;
      } else {
        prod.quantity = Math.max(0, (Number(prod.quantity) || 0) - it.quantity);
      }
    }
  });

  var op = { id: Date.now(), type: type, counterparty: counterparty, date: date, notes: notes, items: items };
  state.operations.push(op);
  await saveSnapshot();
  closeModal();
  renderOperation(type);
  showNotif('Операцію збережено', 'success');
}


function deleteOperation(id, type) {
  if (!confirm('Видалити цю операцію?')) return;
  var op = state.operations.find(function(o) { return o.id === id; });
  if (op) {
    var items = op.items;
    if (!items && op.product_name) {
      items = [{product_id: op.product_id, product_name: op.product_name, quantity: op.quantity, price: op.price}];
    }
    items = items || [];
    items.forEach(function(it) {
      var prod = state.products.find(function(p) { return String(p.id) === String(it.product_id); });
      if (prod) {
        if (op.type === 'incoming') {
          prod.quantity = Math.max(0, (Number(prod.quantity) || 0) - Number(it.quantity));
        } else {
          prod.quantity = (Number(prod.quantity) || 0) + Number(it.quantity);
        }
      }
    });
  }
  state.operations = state.operations.filter(function(o) { return o.id !== id; });
  saveSnapshot().then(function() {
    renderOperation(type);
    showNotif('Операцію видалено', 'success');
  });
}

      if (depts.length > 0) {
        html += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">'+deptsHtml+'</div>';
        html += '<div style="height:6px;background:var(--border);border-radius:3px;margin-bottom:4px"><div style="height:6px;background:var(--accent);border-radius:3px;width:'+Math.round(doneCnt/depts.length*100)+'%"></div></div>';
        html += '<div style="font-size:12px;color:var(--text2)">'+doneCnt+'/'+depts.length+' відділів готово &bull; Розпочато: '+prod.started+'</div>';
      } else {
        html += '<div style="font-size:12px;color:var(--text2)">Відділи не визначено &bull; Розпочато: '+prod.started+'</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }
  html += '<h3 style="margin:0 0 10px;color:var(--text)">✅ Завершено ('+done.length+')</h3>';
  if (done.length === 0) {
    html += '<div style="color:var(--text2)">Немає завершених</div>';
  } else {
    html += '<table class="data-table"><thead><tr><th>Модель</th><th>К-сть</th><th>Завершено</th></tr></thead><tbody>';
    done.forEach(function(prod){ html += '<tr><td>'+prod.recipe_name+'</td><td>'+prod.quantity+' '+(prod.unit||'шт')+'</td><td>'+prod.started+'</td></tr>'; });
    html += '</tbody></table>';
  }
  document.getElementById('page-content').innerHTML = html;
}

async function advanceDeptStatus(prodId, deptId) {
  var prod = state.production.find(function(p){return p.id===prodId;});
  if (!prod || !prod.departments) return;
  var dept = prod.departments.find(function(d){return d.id===deptId;});
  if (!dept) return;
  dept.status = dept.status==='pending' ? 'in_progress' : dept.status==='in_progress' ? 'done' : 'pending';
  var allDone = prod.departments.every(function(d){return d.status==='done';});
  if (allDone) showNotif('Всі відділи готові! Натисніть "На склад" для завершення', 'success');
  await saveSnapshot();
  renderProduction();
}

function openStartProductionModal(recipeId) {
  var r = state.recipes.find(function(x){return x.id===recipeId;});
  if (!r) return;
  document.getElementById('modal-title').textContent = 'Запустити: ' + r.name;
  document.getElementById('modal-overlay').style.display = 'flex';
  var ingHtml = (r.ingredients||[]).map(function(i){
    var p = state.products.find(function(x){return x.id===i.product_id;});
    var ok = p && p.quantity >= i.qty;
    return '<div style="display:flex;justify-content:space-between;padding:4px 0"><span>'+i.name+'</span><span style="color:'+(ok?'var(--accent)':'var(--danger)')+'">'+i.qty+' '+i.unit+' '+(ok?'✓':'⚠️ мало!')+'</span></div>';
  }).join('');
  var deptsHtml = (r.departments||[]).length > 0
    ? '<div style="margin-top:12px"><strong>Відділи:</strong> '+(r.departments||[]).map(function(d){return '<span class="badge badge-gray" style="margin-right:4px">'+d.name+'</span>';}).join('')+'</div>' : '';
  document.getElementById('modal-body').innerHTML =
    '<div class="form-group"><label class="form-label">Кількість порцій</label><input type="number" class="form-input" id="prod-qty" value="1" min="1"></div>' +
    (ingHtml ? '<div style="margin-top:8px"><strong>Інгредієнти (на 1 порцію):</strong>'+ingHtml+'</div>' : '') +
    deptsHtml;
  document.getElementById('modal-footer').innerHTML =
    '<button class="btn btn-secondary" onclick="closeModal()">Скасувати</button><button class="btn" onclick="confirmStartProduction('+recipeId+')">▶️ Запустити</button>';
}

function startProduction(recipeId) { openStartProductionModal(recipeId); }

async function confirmStartProduction(recipeId) {
  var r = state.recipes.find(function(x){return x.id===recipeId;});
  if (!r) return;
  var qty = parseInt(document.getElementById('prod-qty').value)||1;
  (r.ingredients||[]).forEach(function(ing){
    var p = state.products.find(function(x){return x.id===ing.product_id;});
    if (p) p.quantity = Math.max(0,(Number(p.quantity)||0)-ing.qty*qty);
  });
  var departments = (r.departments||[]).map(function(d){return {id:d.id,name:d.name,status:'pending'};});
  state.production.push({ id:Date.now(), recipe_name:r.name, recipe_id:r.id, quantity:qty*r.output, unit:r.unit, status:'in_progress', started:new Date().toISOString().split('T')[0], departments:departments });
  await saveSnapshot();
  closeModal();
  navigate('production');
  showNotif('Виробництво запущено!', 'success');
}

async function completeProduction(id) {
  var prod = state.production.find(function(p){return p.id===id;});
  if (!prod) return;
  prod.status = 'completed';
  var recipe = state.recipes.find(function(r){return r.id===prod.recipe_id;});
  if (recipe) {
    var pName = recipe.name;
    var existing = state.products.find(function(p){return p.name===pName;});
    if (existing) { existing.quantity = (Number(existing.quantity)||0) + Number(prod.quantity); }
    else { state.products.push({ id:Date.now(), name:pName, category:'Готова продукція', unit:recipe.unit||'шт', quantity:Number(prod.quantity), min_qty:0, price:0 }); }
  }
  await saveSnapshot();
  renderProduction();
  showNotif('Наряд завершено! Товар додано на склад.', 'success');
}

function renderReports() {
  const incoming = state.operations.filter(o => o.type === 'incoming');
  const outgoing = state.operations.filter(o => o.type === 'outgoing');
  const totalIn = incoming.reduce((s,o) => s + o.quantity * o.price, 0);
  const totalOut = outgoing.reduce((s,o) => s + o.quantity * o.price, 0);
  const byCategory = {};
  state.products.forEach(p => { byCategory[p.category] = (byCategory[p.category]||0) + p.quantity * p.price; });
  document.getElementById('page-content').innerHTML = `
<div class="stats-grid">
<div class="stat-card green"><div class="label">Загальний прихід</div><div class="value">${formatMoney(totalIn)}</div><div class="sub">грн</div></div>
<div class="stat-card blue"><div class="label">Загальний видаток</div><div class="value">${formatMoney(totalOut)}</div><div class="sub">грн</div></div>
<div class="stat-card"><div class="label">Операцій</div><div class="value">${state.operations.length}</div><div class="sub">всього</div></div>
<div class="stat-card yellow"><div class="label">Замовлень</div><div class="value">${state.orders.length}</div><div class="sub">всього</div></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
<div class="table-container">
<div class="table-header"><h3>📊 По категоріях</h3></div>
<table><thead><tr><th>Категорія</th><th>Вартість</th></tr></thead><tbody>
${Object.entries(byCategory).map(([cat,val]) => `<tr><td><span class="badge badge-gray">${cat}</span></td><td>${formatMoney(val)} грн</td></tr>`).join('')}
</tbody></table></div>
<div class="table-container">
<div class="table-header"><h3>📈 Замовлення по статусах</h3></div>
<table><thead><tr><th>Статус</th><th>Кількість</th></tr></thead><tbody>
<tr><td>${orderBadge('new')}</td><td>${state.orders.filter(o=>o.status==='new').length}</td></tr>
<tr><td>${orderBadge('in_production')}</td><td>${state.orders.filter(o=>o.status==='in_production').length}</td></tr>
<tr><td>${orderBadge('ready')}</td><td>${state.orders.filter(o=>o.status==='ready').length}</td></tr>
<tr><td>${orderBadge('shipped')}</td><td>${state.orders.filter(o=>o.status==='shipped').length}</td></tr>
</tbody></table></div>
</div>`;
}

function renderWarehouse() {
  document.getElementById('page-content').innerHTML = `
<div class="table-container">
<div class="table-header"><h3>🏠 Мої склади</h3></div>
<div style="padding:20px">
${state.warehouse ? `
<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:20px">
<div style="font-size:18px;font-weight:700;margin-bottom:8px">🏭 ${state.warehouse.name || 'Основний склад'}</div>
<div style="color:var(--text2);font-size:13px;margin-bottom:16px">ID: ${state.warehouse.id}</div>
<div style="display:flex;gap:16px;font-size:14px">
<div><span style="color:var(--text2)">Товарів:</span> <strong>${state.products.length}</strong></div>
<div><span style="color:var(--text2)">Операцій:</span> <strong>${state.operations.length}</strong></div>
<div><span style="color:var(--text2)">Замовлень:</span> <strong>${state.orders.length}</strong></div>
</div>
<div style="margin-top:16px">
<label class="form-label">Назва складу</label>
<div style="display:flex;gap:8px">
<input class="form-input" id="wh-name" value="${state.warehouse.name||''}" placeholder="Назва складу" style="max-width:300px">
<button class="btn btn-primary" onclick="saveWarehouseName()">Зберегти</button>
</div>
</div>
</div>
` : '<div class="empty-state"><div class="icon">🏠</div><h3>Склад не знайдено</h3></div>'}
</div></div>`;
}

async function saveWarehouseName() {
  const name = document.getElementById('wh-name').value;
  if (state.warehouse) {
    await sb.from('warehouses').update({ name }).eq('id', state.warehouse.id);
    state.warehouse.name = name;
    document.getElementById('warehouse-name').textContent = name;
    showNotif('Назву збережено', 'success');
  }
}

function renderTeam() {
  document.getElementById('page-content').innerHTML = `
<div class="table-container">
<div class="table-header"><h3>👥 Команда</h3><button class="btn btn-primary" onclick="openInviteModal()">+ Запросити</button></div>
<table><thead><tr><th>Користувач</th><th>Роль</th><th>Дата приєднання</th></tr></thead><tbody>
<tr><td><div style="display:flex;align-items:center;gap:10px"><div class="avatar" style="width:32px;height:32px;font-size:13px">${(state.user?.user_metadata?.full_name||state.user?.email||'?')[0].toUpperCase()}</div><div>${state.user?.user_metadata?.full_name || state.user?.email}</div></div></td>
<td><span class="badge badge-green">Власник</span></td>
<td>${new Date(state.warehouse?.created_at||Date.now()).toLocaleDateString('uk-UA')}</td></tr>
</tbody></table></div>`;
}

function openInviteModal() {
  document.getElementById('modal-title').textContent = 'Запросити користувача';
  document.getElementById('modal-body').innerHTML = `<div class="form-group"><label class="form-label">Email користувача</label><input class="form-input" id="invite-email" placeholder="user@example.com"></div>
<div class="form-group"><label class="form-label">Роль</label><select class="form-select" id="invite-role"><option value="manager">Менеджер</option><option value="worker">Працівник</option><option value="viewer">Спостерігач</option></select></div>`;
  document.getElementById('modal-footer').innerHTML = `<button class="btn btn-secondary" onclick="closeModal()">Скасувати</button><button class="btn btn-primary" onclick="showNotif('Запрошення відправлено','success');closeModal()">Запросити</button>`;
  document.getElementById('modal-overlay').style.display = 'flex';
}

// ====== UTILS ======
function formatMoney(n) { return new Intl.NumberFormat('uk-UA', { minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n || 0); }

function showNotif(text, type = 'success') {
  const n = document.getElementById('notification');
  document.getElementById('notif-icon').textContent = type === 'success' ? '✅' : '❌';
  document.getElementById('notif-text').textContent = text;
  n.className = 'notification ' + type;
  n.style.display = 'flex';
  setTimeout(() => n.style.display = 'none', 3500);
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) document.getElementById('modal-overlay').style.display = 'none';
}

// ====== STARTUP ======
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) { await initApp(session.user); }
})();
</script>
</body>
</html>
